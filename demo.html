
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Raychat - ভিডিও কল ও মেসেঞ্জার</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: linear-gradient(145deg, #1a2a3a 0%, #0f1724 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .app-container { width: 100%; max-width: 1200px; height: 92vh; background: rgba(255,255,255,0.96); border-radius: 2rem; box-shadow: 0 25px 45px rgba(0,0,0,0.3); overflow: hidden; display: flex; flex-direction: column; }
        .auth-container { flex: 1; display: flex; justify-content: center; align-items: center; background: #075e54; padding: 20px; }
        .auth-card { background: white; border-radius: 32px; padding: 30px 24px; width: 100%; max-width: 400px; text-align: center; }
        .auth-card h2 { color: #075e54; margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 12px 16px; margin: 12px 0; border: 1px solid #ddd; border-radius: 40px; font-size: 1rem; outline: none; }
        .auth-btn { background: #25d366; color: #075e54; font-weight: bold; border: none; padding: 12px; width: 100%; border-radius: 40px; cursor: pointer; margin-top: 12px; }
        .auth-switch { margin-top: 20px; color: #128c7e; cursor: pointer; font-size: 0.9rem; }
        .error-msg { color: #e74c3c; font-size: 0.8rem; margin-top: 6px; }
        .hide { display: none !important; }
        .main-app { display: flex; height: 100%; width: 100%; overflow: hidden; }
        .chats-panel { width: 35%; background: #f0f2f5; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; overflow-y: auto; }
        .chat-panel { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; background-image: radial-gradient(circle at 25% 40%, rgba(200,220,210,0.4) 1.5%, transparent 1.8%); }
        @media (max-width: 700px) {
            .chats-panel { width: 100%; position: absolute; z-index: 10; height: 100%; transition: transform 0.2s; }
            .chats-panel.hide-mobile { transform: translateX(-100%); }
            .back-btn { display: block !important; }
        }
        .profile-header { background: #075e54; color: white; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .new-chat-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #e9ecef; }
        .chat-item:hover, .chat-item.active { background: #e9ecef; }
        .chat-avatar { width: 48px; height: 48px; background: #128c7e; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.2rem; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; }
        .chat-phone { font-size: 0.75rem; color: #6c757d; }
        .chat-header { background: #075e54; color: white; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
        .back-btn { display: none; background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; }
        .chat-name-header { font-weight: 700; flex: 1; }
        .call-btn-sm { background: rgba(255,255,255,0.2); border: none; color: white; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; margin-left: 6px; }
        .messages-area { flex: 1; overflow-y: auto; padding: 18px 14px; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; flex-direction: column; max-width: 80%; animation: popIn 0.2s ease; }
        .message-own { align-self: flex-end; }
        .message-other { align-self: flex-start; }
        .bubble { padding: 10px 14px; border-radius: 18px; word-wrap: break-word; background: white; }
        .bubble-own { background: #dcf8c5; border-bottom-right-radius: 4px; }
        .bubble-other { background: white; border-bottom-left-radius: 4px; }
        .message-time { font-size: 0.6rem; color: #6c757d; margin-top: 4px; margin-left: 10px; }
        .input-area { background: #f0f2f5; padding: 12px 16px; display: flex; gap: 12px; }
        .message-input { flex: 1; border: none; background: white; padding: 12px 18px; border-radius: 30px; outline: none; }
        .send-btn { background: #25d366; border: none; color: white; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 1200; }
        .modal-card { background: white; width: 90%; max-width: 400px; border-radius: 32px; padding: 24px; text-align: center; }
        .modal-card input { width: 100%; padding: 12px; margin: 16px 0; border-radius: 40px; border: 1px solid #ccc; }
        .modal-card button { background: #25d366; padding: 10px 20px; border-radius: 40px; border: none; font-weight: bold; margin: 8px; cursor: pointer; }
        .toast-error { position: fixed; bottom: 100px; left: 20px; right: 20px; background: #e74c3c; color: white; padding: 10px; border-radius: 30px; text-align: center; z-index: 2000; font-size: 0.9rem; }
        @keyframes popIn { from { opacity:0; transform:translateY(8px);} to { opacity:1; transform:translateY(0);} }
        
        /* Fullscreen Video Call Styles (WhatsApp-like) */
        .call-fullscreen-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .remote-video-full {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #0a0a0a;
        }
        .local-video-pip {
            position: absolute;
            bottom: 24px;
            right: 20px;
            width: 120px;
            aspect-ratio: 3 / 4;
            border-radius: 20px;
            overflow: hidden;
            background: #1e1e1e;
            border: 2px solid rgba(255,255,255,0.7);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            z-index: 10010;
            transition: all 0.2s;
            cursor: pointer;
        }
        .local-video-pip video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .call-controls-overlay {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 28px;
            z-index: 10010;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .call-controls-overlay button {
            background: #2c2c2e;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 24px;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .call-controls-overlay button:active { transform: scale(0.96); }
        .call-end-btn { background: #e74c3c !important; }
        .call-mute-btn, .call-video-toggle { background: #2c2c2e !important; }
        .remote-info {
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            text-shadow: 0 2px 8px black;
            font-size: 22px;
            font-weight: 600;
            z-index: 10010;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
            padding: 16px;
            pointer-events: none;
        }
        /* Audio call fullscreen (style) */
        .audio-call-ui {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f2120;
            position: relative;
        }
        .audio-avatar {
            background: #128c7e;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
        }
        .audio-avatar i { font-size: 64px; color: white; }
        @media (max-width: 550px) {
            .local-video-pip { width: 100px; bottom: 16px; right: 16px; }
            .call-controls-overlay button { width: 48px; height: 48px; font-size: 20px; }
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <div id="authContainer" class="auth-container">
        <div class="auth-card">
            <h2><i class="fab fa-whatsapp"></i> Rayচ্যাট</h2>
            <div id="loginForm">
                <input type="email" id="loginEmail" class="auth-input" placeholder="ইমেল">
                <input type="password" id="loginPassword" class="auth-input" placeholder="পাসওয়ার্ড">
                <button id="doLoginBtn" class="auth-btn">সাইন ইন করুন</button>
                <div class="auth-switch" id="showSignupBtn">অ্যাকাউন্ট নেই? সাইন আপ করুন</div>
            </div>
            <div id="signupForm" class="hide">
                <input type="text" id="signupName" class="auth-input" placeholder="আপনার নাম">
                <input type="tel" id="signupPhone" class="auth-input" placeholder="মোবাইল নম্বর (যেমন: +8801xxxxxxxx)">
                <input type="email" id="signupEmail" class="auth-input" placeholder="ইমেল">
                <input type="password" id="signupPassword" class="auth-input" placeholder="পাসওয়ার্ড">
                <button id="doSignupBtn" class="auth-btn">সাইন আপ করুন</button>
                <div class="auth-switch" id="showLoginBtn">ইতিমধ্যে অ্যাকাউন্ট আছে? লগইন করুন</div>
            </div>
            <div id="authError" class="error-msg"></div>
        </div>
    </div>

    <div id="mainApp" class="main-app hide">
        <div id="chatsPanel" class="chats-panel">
            <div class="profile-header">
                <span><i class="fab fa-whatsapp"></i> চ্যাটসমূহ</span>
                <div>
                    <button id="newChatBtn" class="new-chat-btn"><i class="fas fa-plus"></i></button>
                    <button id="logoutBtn" class="new-chat-btn" style="margin-left: 8px;"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
            <div id="chatsList" style="flex:1; overflow-y: auto;"></div>
        </div>
        <div id="chatPanel" class="chat-panel">
            <div class="chat-header">
                <button id="mobileBackBtn" class="back-btn"><i class="fas fa-arrow-left"></i></button>
                <div class="chat-name-header" id="chatContactName">কাউকে সিলেক্ট করুন</div>
                <button id="audioCallBtn" class="call-btn-sm"><i class="fas fa-phone-alt"></i></button>
                <button id="videoCallBtn" class="call-btn-sm"><i class="fas fa-video"></i></button>
            </div>
            <div id="messagesArea" class="messages-area"></div>
            <div class="input-area">
                <input type="text" id="chatMessageInput" class="message-input" placeholder="মেসেজ লিখুন...">
                <button id="sendMsgBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "firebase/auth";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, orderBy, onSnapshot, addDoc, serverTimestamp, updateDoc } from "firebase/firestore";

    const firebaseConfig = {
        apiKey: "AIzaSyAoZdkD0PZz25lIVrNy3hQE2fBrkHELs2Q",
        authDomain: "rayvid-c074a.firebaseapp.com",
        projectId: "rayvid-c074a",
        storageBucket: "rayvid-c074a.firebasestorage.app",
        messagingSenderId: "970771885312",
        appId: "1:970771885312:web:104ae741f28287a01ad7e5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM elements
    const authContainer = document.getElementById('authContainer');
    const mainAppDiv = document.getElementById('mainApp');
    const loginFormDiv = document.getElementById('loginForm');
    const signupFormDiv = document.getElementById('signupForm');
    const authErrorSpan = document.getElementById('authError');
    const chatsListDiv = document.getElementById('chatsList');
    const chatContactNameSpan = document.getElementById('chatContactName');
    const messagesArea = document.getElementById('messagesArea');
    const chatMessageInput = document.getElementById('chatMessageInput');
    const sendMsgBtn = document.getElementById('sendMsgBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const audioCallBtn = document.getElementById('audioCallBtn');
    const videoCallBtn = document.getElementById('videoCallBtn');
    const mobileBackBtn = document.getElementById('mobileBackBtn');
    const chatsPanel = document.getElementById('chatsPanel');
    const newChatBtn = document.getElementById('newChatBtn');

    let currentUser = null;
    let currentUserDoc = null;
    let selectedChat = null;
    let unsubscribeMessages = null;
    let unsubscribeChats = null;

    // WebRTC globals
    let peerConnection = null, localStream = null, remoteAudio = null, remoteVideoElem = null;
    let currentCallDocId = null, isCallActive = false, callSignalUnsubscribe = null, callPanelDiv = null;

    function showToast(msg) {
        let toast = document.querySelector('.toast-error');
        if(toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast-error';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function getConversationId(uid1, uid2) { return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`; }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // Load user chats
    function loadUserChats() {
        if (unsubscribeChats) unsubscribeChats();
        const convQuery = query(collection(db, "conversations"), where("participants", "array-contains", currentUser.uid));
        unsubscribeChats = onSnapshot(convQuery, async (snapshot) => {
            const chats = [];
            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const otherId = data.participants.find(p => p !== currentUser.uid);
                if (otherId) {
                    const userDoc = await getDoc(doc(db, "users", otherId));
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        chats.push({ conversationId: docSnap.id, contactId: otherId, name: userData.name || "বন্ধু", phone: userData.phone || "নম্বর নাই" });
                    }
                }
            }
            renderChatsList(chats);
        });
    }

    function renderChatsList(chats) {
        if (chats.length === 0) { chatsListDiv.innerHTML = '<div style="padding:20px; text-align:center;">কোনো চ্যাট নেই। + বাটনে ক্লিক করুন</div>'; return; }
        chatsListDiv.innerHTML = '';
        chats.forEach(chat => {
            const div = document.createElement('div');
            div.className = 'chat-item';
            if (selectedChat && selectedChat.contactId === chat.contactId) div.classList.add('active');
            div.innerHTML = `<div class="chat-avatar">${chat.name.charAt(0).toUpperCase()}</div><div class="chat-info"><div class="chat-name">${escapeHtml(chat.name)}</div><div class="chat-phone">${escapeHtml(chat.phone)}</div></div>`;
            div.addEventListener('click', () => { selectChat(chat); if (window.innerWidth <= 700) chatsPanel.classList.add('hide-mobile'); });
            chatsListDiv.appendChild(div);
        });
    }

    async function selectChat(chat) {
        if (unsubscribeMessages) unsubscribeMessages();
        selectedChat = chat;
        chatContactNameSpan.innerText = `${chat.name} (${chat.phone})`;
        messagesArea.innerHTML = '<div style="text-align:center;">মেসেজ লোড হচ্ছে...</div>';
        const convId = getConversationId(currentUser.uid, chat.contactId);
        const messagesRef = collection(db, "conversations", convId, "messages");
        const q = query(messagesRef, orderBy("timestamp", "asc"));
        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            if (snapshot.empty) { messagesArea.innerHTML = '<div style="text-align:center; color:gray;">কোনো মেসেজ নেই ✨</div>'; return; }
            messagesArea.innerHTML = '';
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const isOwn = data.senderId === currentUser.uid;
                const time = data.timestamp?.toDate() || new Date();
                const timeStr = time.toLocaleTimeString('bn-BD', { hour:'2-digit', minute:'2-digit' });
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
                const bubble = document.createElement('div');
                bubble.className = `bubble ${isOwn ? 'bubble-own' : 'bubble-other'}`;
                bubble.innerText = data.text;
                msgDiv.appendChild(bubble);
                const timeSpan = document.createElement('div');
                timeSpan.className = 'message-time';
                timeSpan.innerText = timeStr;
                msgDiv.appendChild(timeSpan);
                messagesArea.appendChild(msgDiv);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        });
    }

    async function sendPrivateMessage() {
        if (!selectedChat) { showToast("একটি চ্যাট নির্বাচন করুন"); return; }
        const text = chatMessageInput.value.trim();
        if (!text) return;
        const convId = getConversationId(currentUser.uid, selectedChat.contactId);
        await addDoc(collection(db, "conversations", convId, "messages"), { text, senderId: currentUser.uid, senderName: currentUserDoc?.name, receiverId: selectedChat.contactId, timestamp: serverTimestamp() });
        chatMessageInput.value = "";
    }

    // New chat modal
    function openNewChatModal() {
        const modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-card"><i class="fas fa-search" style="font-size:2rem;color:#075e54;"></i><h3>ফোন নম্বর দিয়ে খুঁজুন</h3><input type="tel" id="searchPhoneInputModal" placeholder="যেমন: +8801xxxxxxxx"><div id="searchResult"></div><button id="modalCloseBtn">বন্ধ</button></div>`;
        document.body.appendChild(modal);
        const searchInput = modal.querySelector('#searchPhoneInputModal');
        const resultDiv = modal.querySelector('#searchResult');
        const closeBtn = modal.querySelector('#modalCloseBtn');
        searchInput.addEventListener('input', async (e) => {
            const phone = e.target.value.trim();
            if (phone.length < 5) { resultDiv.innerHTML = ''; return; }
            const usersRef = collection(db, "users");
            const q = query(usersRef, where("phone", "==", phone));
            const querySnap = await getDocs(q);
            if (querySnap.empty) { resultDiv.innerHTML = '<p style="color:red;">ব্যবহারকারী পাওয়া যায়নি</p>'; return; }
            let found = null;
            querySnap.forEach(docSnap => { const data = docSnap.data(); if (data.uid !== currentUser.uid) found = data; });
            if (!found) { resultDiv.innerHTML = '<p style="color:red;">নিজের অথবা নম্বরটি নেই</p>'; return; }
            resultDiv.innerHTML = `<div style="background:#f0f2f5; padding:12px; border-radius:20px;"><p><strong>${escapeHtml(found.name)}</strong></p><p>${escapeHtml(found.phone)}</p><button id="startChatBtn" style="background:#25d366;">চ্যাট শুরু করুন</button></div>`;
            const startBtn = resultDiv.querySelector('#startChatBtn');
            startBtn.onclick = async () => {
                const convId = getConversationId(currentUser.uid, found.uid);
                const convRef = doc(db, "conversations", convId);
                if (!(await getDoc(convRef)).exists()) await setDoc(convRef, { participants: [currentUser.uid, found.uid], lastUpdated: serverTimestamp() });
                modal.remove();
                const newChat = { contactId: found.uid, name: found.name, phone: found.phone, conversationId: convId };
                selectChat(newChat);
                loadUserChats();
                if (window.innerWidth <= 700) chatsPanel.classList.add('hide-mobile');
            };
        });
        closeBtn.onclick = () => modal.remove();
    }

    // ---------- WEBRTC WITH FULLSCREEN REMOTE VIDEO (WhatsApp style) ----------
    const iceServers = [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }, { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" }];
    async function getMediaStream(videoEnabled) { if (localStream) localStream.getTracks().forEach(t => t.stop()); const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: videoEnabled }); localStream = stream; return stream; }
    
    async function createPeerConnection(callDocId) {
        if (peerConnection) peerConnection.close();
        const pc = new RTCPeerConnection({ iceServers });
        if (localStream) localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        pc.onicecandidate = async (e) => { if (e.candidate) await addDoc(collection(db, "calls", callDocId, "candidates"), { candidate: e.candidate.toJSON(), senderId: currentUser.uid }); };
        pc.ontrack = (e) => {
            if (e.track.kind === "audio") { if (!remoteAudio) { remoteAudio = new Audio(); remoteAudio.srcObject = e.streams[0]; remoteAudio.play(); } else remoteAudio.srcObject = e.streams[0]; }
            else if (e.track.kind === "video" && remoteVideoElem) remoteVideoElem.srcObject = e.streams[0];
        };
        pc.onconnectionstatechange = () => { if (pc.connectionState === "failed") { endCall(); showToast("কল সংযোগ ব্যর্থ"); } };
        return pc;
    }

    // Fullscreen modern call UI (remote fullscreen + local pip)
    function showModernCallUI(remoteName, isVideoCall) {
        if (callPanelDiv) callPanelDiv.remove();
        callPanelDiv = document.createElement("div");
        callPanelDiv.className = "call-fullscreen-panel";
        
        if (isVideoCall) {
            callPanelDiv.innerHTML = `
                <video id="remoteVideoFullscreen" class="remote-video-full" autoplay playsinline></video>
                <div class="local-video-pip" id="localVideoPip"><video id="localPreviewVideo" autoplay muted playsinline></video></div>
                <div class="call-controls-overlay">
                    <button class="call-mute-btn" id="callMuteBtn"><i class="fas fa-microphone"></i></button>
                    <button class="call-video-toggle" id="callVideoToggleBtn"><i class="fas fa-video"></i></button>
                    <button class="call-end-btn" id="callEndBtn"><i class="fas fa-phone-slash"></i></button>
                </div>
                <div class="remote-info">${escapeHtml(remoteName)}</div>
            `;
            document.body.appendChild(callPanelDiv);
            const localVid = document.getElementById('localPreviewVideo');
            if (localStream) localVid.srcObject = localStream;
            remoteVideoElem = document.getElementById('remoteVideoFullscreen');
        } else {
            // Audio call beautiful fullscreen
            callPanelDiv.innerHTML = `
                <div class="audio-call-ui">
                    <div class="audio-avatar"><i class="fas fa-user-circle"></i></div>
                    <div style="color:white; font-size:28px; font-weight:bold;">${escapeHtml(remoteName)}</div>
                    <div style="color:#a0c0c0; margin:12px 0;">অডিও কল সংযুক্ত</div>
                    <div class="call-controls-overlay" style="position:relative; background:rgba(0,0,0,0.6); margin-top:40px;">
                        <button class="call-mute-btn" id="callMuteBtn"><i class="fas fa-microphone"></i></button>
                        <button class="call-end-btn" id="callEndBtn"><i class="fas fa-phone-slash"></i></button>
                    </div>
                </div>
            `;
            document.body.appendChild(callPanelDiv);
            remoteVideoElem = null;
        }
        
        // attach events
        const endBtn = callPanelDiv.querySelector('#callEndBtn');
        if (endBtn) endBtn.addEventListener('click', () => endCall());
        const muteBtn = callPanelDiv.querySelector('#callMuteBtn');
        if (muteBtn && localStream) {
            let muted = false;
            muteBtn.addEventListener('click', () => {
                muted = !muted;
                localStream.getAudioTracks().forEach(t => t.enabled = !muted);
                muteBtn.innerHTML = muted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
            });
        }
        if (isVideoCall) {
            const videoToggle = callPanelDiv.querySelector('#callVideoToggleBtn');
            if (videoToggle && localStream && localStream.getVideoTracks().length) {
                let videoOff = false;
                videoToggle.addEventListener('click', () => {
                    videoOff = !videoOff;
                    localStream.getVideoTracks()[0].enabled = !videoOff;
                    videoToggle.innerHTML = videoOff ? '<i class="fas fa-video-slash"></i>' : '<i class="fas fa-video"></i>';
                });
            }
        }
    }
    
    async function startCall(targetUser, isVideo) {
        if (!selectedChat) { showToast("একটি চ্যাট নির্বাচন করুন"); return; }
        if (isCallActive) { showToast("কল চলছে"); return; }
        try {
            isCallActive = true;
            await getMediaStream(isVideo);
            const callDoc = await addDoc(collection(db, "calls"), {
                from: currentUser.uid, fromName: currentUserDoc?.name, to: targetUser.contactId, toName: targetUser.name,
                status: "calling", type: isVideo ? "video" : "audio", createdAt: serverTimestamp()
            });
            currentCallDocId = callDoc.id;
            peerConnection = await createPeerConnection(currentCallDocId);
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            await updateDoc(doc(db, "calls", currentCallDocId), { offer: { sdp: offer.sdp, type: offer.type }, status: "offer_sent" });
            
            showModernCallUI(targetUser.name, isVideo);
            
            const unsub = onSnapshot(doc(db, "calls", currentCallDocId), async (snap) => {
                const data = snap.data();
                if (data?.answer && peerConnection?.signalingState === "have-local-offer") {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    unsub();
                }
                if (data?.status === "active") { /* already showing UI */ }
                if (data?.status === "rejected" || data?.status === "ended") { unsub(); endCall(); if(data?.status === "rejected") showToast("কল প্রত্যাখ্যান"); }
            });
            callSignalUnsubscribe = unsub;
        } catch(e) { showToast("কল শুরু ব্যর্থ"); endCall(); }
    }
    
    async function answerCall(callId, fromUserObj, isVideo) {
        try {
            await getMediaStream(isVideo);
            const callRef = doc(db, "calls", callId);
            const callSnap = await getDoc(callRef);
            if (!callSnap.exists()) throw new Error();
            const callData = callSnap.data();
            currentCallDocId = callId;
            peerConnection = await createPeerConnection(callId);
            await peerConnection.setRemoteDescription(new RTCSessionDescription(callData.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            await updateDoc(callRef, { answer: { sdp: answer.sdp, type: answer.type }, status: "active" });
            showModernCallUI(fromUserObj.name, isVideo);
            const unsub = onSnapshot(callRef, (snap) => { if (snap.data()?.status === "ended") { unsub(); endCall(); } });
            callSignalUnsubscribe = unsub;
        } catch(e) { showToast("কল গ্রহণ ব্যর্থ"); endCall(); }
    }
    
    async function endCall() {
        if (currentCallDocId) await updateDoc(doc(db, "calls", currentCallDocId), { status: "ended" }).catch(()=>{});
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        if (remoteAudio) { remoteAudio.srcObject = null; remoteAudio = null; }
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        if (callSignalUnsubscribe) callSignalUnsubscribe();
        isCallActive = false; currentCallDocId = null;
        if (callPanelDiv) callPanelDiv.remove(); callPanelDiv = null;
        remoteVideoElem = null;
    }
    
    function listenIncomingCalls() {
        if (!currentUser) return;
        const q = query(collection(db, "calls"), where("to", "==", currentUser.uid), where("status", "in", ["calling", "offer_sent"]));
        onSnapshot(q, async (snapshot) => {
            for (const change of snapshot.docChanges()) {
                if (change.type === "added") {
                    const callData = change.doc.data();
                    if (isCallActive) { await updateDoc(doc(db, "calls", change.doc.id), { status: "rejected" }); return; }
                    const accept = confirm(`${callData.fromName || "অজানা"} ${callData.type === "video" ? "ভিডিও কল" : "অডিও কল"} করছেন। রিসিভ করবেন?`);
                    if (accept) await answerCall(change.doc.id, { name: callData.fromName, uid: callData.from }, callData.type === "video");
                    else await updateDoc(doc(db, "calls", change.doc.id), { status: "rejected" });
                }
            }
        });
    }

    // Auth handlers
    async function createUserProfile(uid, name, phone, email) { await setDoc(doc(db, "users", uid), { name, phone, email, uid, createdAt: serverTimestamp() }); }
    document.getElementById('doSignupBtn').addEventListener('click', async () => {
        const name = document.getElementById('signupName').value.trim(), phone = document.getElementById('signupPhone').value.trim(), email = document.getElementById('signupEmail').value.trim(), password = document.getElementById('signupPassword').value;
        if (!name || !phone || !email || !password) { authErrorSpan.innerText = 'সব ফিল্ড পূরণ করুন'; return; }
        try { const userCred = await createUserWithEmailAndPassword(auth, email, password); await updateProfile(userCred.user, { displayName: name }); await createUserProfile(userCred.user.uid, name, phone, email); } catch(e) { authErrorSpan.innerText = e.message; }
    });
    document.getElementById('doLoginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value, password = document.getElementById('loginPassword').value;
        if (!email || !password) { authErrorSpan.innerText = 'ইমেল ও পাসওয়ার্ড দিন'; return; }
        try { await signInWithEmailAndPassword(auth, email, password); } catch(e) { authErrorSpan.innerText = e.message; }
    });
    document.getElementById('showSignupBtn').onclick = () => { loginFormDiv.classList.add('hide'); signupFormDiv.classList.remove('hide'); authErrorSpan.innerText = ''; };
    document.getElementById('showLoginBtn').onclick = () => { signupFormDiv.classList.add('hide'); loginFormDiv.classList.remove('hide'); authErrorSpan.innerText = ''; };
    logoutBtn.onclick = async () => { await signOut(auth); };
    newChatBtn.onclick = openNewChatModal;
    
    setInterval(async () => { if(currentUser) await setDoc(doc(db, "presence", currentUser.uid), { uid: currentUser.uid, lastSeen: serverTimestamp() }, { merge: true }); }, 20000);
    
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) currentUserDoc = userDoc.data();
            else currentUserDoc = { name: user.displayName || "বন্ধু", phone: "" };
            authContainer.classList.add('hide');
            mainAppDiv.classList.remove('hide');
            loadUserChats();
            listenIncomingCalls();
            sendMsgBtn.onclick = sendPrivateMessage;
            chatMessageInput.onkeypress = (e) => { if(e.key === 'Enter') sendPrivateMessage(); };
            audioCallBtn.onclick = () => { if(selectedChat) startCall(selectedChat, false); else showToast("একটি চ্যাট নির্বাচন করুন"); };
            videoCallBtn.onclick = () => { if(selectedChat) startCall(selectedChat, true); else showToast("একটি চ্যাট নির্বাচন করুন"); };
            mobileBackBtn.onclick = () => chatsPanel.classList.remove('hide-mobile');
        } else {
            if (unsubscribeMessages) unsubscribeMessages();
            if (unsubscribeChats) unsubscribeChats();
            endCall();
            authContainer.classList.remove('hide');
            mainAppDiv.classList.add('hide');
            selectedChat = null;
        }
    });
</script>
