<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCS শাফল স্টাডি | একবার পড়া শেষ মানে চিরতরে</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase SDKs - সঠিক অর্ডারে লোড করা হয়েছে -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <style>
        /* আপনার স্টাইলগুলো এখানে হুবহু থাকবে */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #f0f7ff 0%, #e6edf4 100%); font-family: 'Inter', 'Noto Sans Bengali', sans-serif; color: #1e2f3e; padding: 1.5rem; }
        .max-w { max-width: 1300px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.92); backdrop-filter: blur(2px); border-radius: 2rem; padding: 1.5rem; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        .btn { border: none; padding: 0.6rem 1.2rem; border-radius: 2rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #1b5a7e; color: white; }
        .btn-outline { background: transparent; border: 1px solid #2c6e9e; color: #2c6e9e; }
        .btn-google { background: #4285f4; color: white; display: inline-flex; align-items: center; gap: 10px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .stats { display: flex; gap: 1rem; flex-wrap: wrap; margin: 1rem 0; }
        .stat { background: white; border-radius: 1.5rem; padding: 0.8rem 1.2rem; flex: 1; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-num { font-size: 2rem; font-weight: 800; color: #1b5a7e; }
        .progress { background: #d9e2ec; border-radius: 30px; height: 10px; margin: 0.5rem 0; overflow: hidden;}
        .progress-fill { background: #2c6e9e; width: 0%; height: 100%; border-radius: 30px; transition: width 0.5s ease; }
        .topic-list { display: flex; flex-direction: column; gap: 0.7rem; margin-top: 1rem; }
        .topic-item { background: #f8fbfe; border-radius: 1.2rem; padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2edf5; }
        .topic-name { font-weight: 500; flex: 2; }
        .topic-cat { background: #d4e3ef; padding: 0.2rem 0.7rem; border-radius: 30px; font-size: 0.7rem; margin: 0 10px; }
        .btn-done { background: #1b5a7e; color: white; border: none; padding: 0.3rem 1rem; border-radius: 2rem; cursor: pointer; }
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .user-info { display: flex; align-items: center; gap: 1rem; background: white; padding: 0.5rem 1rem; border-radius: 60px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>
<div class="max-w">
    <div class="text-center">
        <h1 style="font-size: 2rem; background: linear-gradient(135deg,#0b3b5f,#2c6e9e); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 10px;">📘 বিসিএস শাফল প্ল্যানার</h1>
        <p><i class="fas fa-random"></i> নিজের গতিতে পড়ুন | একবার Done মানে চিরতরে শেষ</p>
    </div>

    <!-- লগইন সেকশন -->
    <div id="loginScreen" class="card text-center">
        <i class="fab fa-google" style="font-size: 3rem; color: #4285f4;"></i>
        <h3 style="margin-top: 15px;">গুগল অ্যাকাউন্ট দিয়ে লগইন করুন</h3>
        <button id="googleLoginBtn" class="btn btn-google" style="margin-top: 20px;"><i class="fab fa-google"></i> Sign in with Google</button>
    </div>

    <!-- মূল অ্যাপ -->
    <div id="appScreen" class="hidden">
        <div class="flex-between" style="margin-bottom: 20px;">
            <div class="user-info">
                <img id="userAvatar" class="user-avatar" src="">
                <span id="userEmail"></span>
            </div>
            <button id="logoutBtn" class="btn btn-outline">লগআউট <i class="fas fa-sign-out-alt"></i></button>
        </div>

        <div class="card">
            <div class="stats">
                <div class="stat"><i class="fas fa-hourglass-half"></i> <div class="stat-num" id="remainingCount">0</div> বাকি</div>
                <div class="stat"><i class="fas fa-check-circle"></i> <div class="stat-num" id="completedCount">0</div> শেষ</div>
                <div class="stat"><i class="fas fa-chart-line"></i> <div class="stat-num" id="percentComplete">0</div>%</div>
            </div>
            <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
            <div class="flex-between" style="margin-top: 20px;">
                <span><i class="fas fa-lightbulb"></i> অবশিষ্ট টপিক</span>
                <button id="shuffleBtn" class="btn btn-outline"><i class="fas fa-random"></i> শাফল করুন</button>
            </div>
            <div id="topicList" class="topic-list">লোড হচ্ছে...</div>
        </div>
    </div>
</div>

<script>
    // ১. Firebase কনফিগারেশন (আপনার দেওয়া তথ্যই ব্যবহৃত হয়েছে)
    const firebaseConfig = {
        apiKey: "AIzaSyAoZdkD0PZz25lIVrNy3hQE2fBrkHELs2Q",
        authDomain: "rayvid-c074a.firebaseapp.com",
        projectId: "rayvid-c074a",
        storageBucket: "rayvid-c074a.firebasestorage.app",
        messagingSenderId: "970771885312",
        appId: "1:970771885312:web:104ae741f28287a01ad7e5"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const provider = new firebase.auth.GoogleAuthProvider();

    // ২. টপিক লিস্ট (আপনার ৬১টি টপিক এখানে আছে)
    const allTopics = [
        { id:1, name:"প্রয়োগ-অপপ্রয়োগ, বানান ও বাক্য শুদ্ধি (বাংলা)", cat:"বাংলা ভাষা" },
        { id:2, name:"পরিভাষা, সমার্থক ও বিপরীতার্থক শব্দ", cat:"বাংলা ভাষা" },
        { id:3, name:"ধ্বনি, বর্ণ, শব্দ, পদ, বাক্য", cat:"বাংলা ভাষা" },
        { id:4, name:"প্রত্যয়, সন্ধি ও সমাস", cat:"বাংলা ভাষা" },
        { id:5, name:"প্রাচীন ও মধ্যযুগের সাহিত্য", cat:"বাংলা সাহিত্য" },
        { id:6, name:"আধুনিক যুগের কবিতা (১৮০০-বর্তমান)", cat:"বাংলা সাহিত্য" },
        { id:7, name:"আধুনিক যুগের গল্প, উপন্যাস, নাটক, প্রবন্ধ", cat:"বাংলা সাহিত্য" },
        { id:8, name:"Parts of Speech: Noun, Pronoun (English)", cat:"English" },
        { id:9, name:"Verb (Finite, Non-finite, Linking, Phrasal, Modals)", cat:"English" },
        { id:10, name:"Adjective, Adverb, Preposition, Conjunction", cat:"English" },
        { id:11, name:"Idioms & Phrases, Clauses", cat:"English" },
        { id:12, name:"Corrections (Tense, Verb, Preposition, S-V Agreement)", cat:"English" },
        { id:13, name:"Sentence Transformations", cat:"English" },
        { id:14, name:"Words: Synonyms, Antonyms, Spelling", cat:"English" },
        { id:15, name:"Composition", cat:"English" },
        { id:16, name:"English Literature: Writers & Quotations", cat:"English Lit." },
        { id:17, name:"প্রাচীন ও মধ্যযুগের ইতিহাস ও সংস্কৃতি", cat:"বাংলাদেশ" },
        { id:18, name:"ভাষা আন্দোলন থেকে অভ্যুত্থান", cat:"বাংলাদেশ" },
        { id:19, name:"মুক্তিযুদ্ধের ইতিহাস", cat:"বাংলাদেশ" },
        { id:20, name:"কৃষিজ সম্পদ ও খাদ্য ব্যবস্থাপনা", cat:"বাংলাদেশ" },
        { id:21, name:"জনসংখ্যা ও ক্ষুদ্র নৃগোষ্ঠী", cat:"বাংলাদেশ" },
        { id:22, name:"অর্থনীতি ও উন্নয়ন", cat:"বাংলাদেশ" },
        { id:23, name:"শিল্প ও বাণিজ্য", cat:"বাংলাদেশ" },
        { id:24, name:"সংবিধান ও মৌলিক অধিকার", cat:"বাংলাদেশ" },
        { id:25, name:"রাজনৈতিক ব্যবস্থা", cat:"বাংলাদেশ" },
        { id:26, name:"সরকার ব্যবস্থা", cat:"বাংলাদেশ" },
        { id:27, name:"জাতীয় অর্জন ও ব্যক্তিত্ব", cat:"বাংলাদেশ" },
        { id:28, name:"বৈশ্বিক ইতিহাস ও ভূ-রাজনীতি", cat:"আন্তর্জাতিক" },
        { id:29, name:"আন্তর্জাতিক নিরাপত্তা ও ক্ষমতা", cat:"আন্তর্জাতিক" },
        { id:30, name:"বিশ্বের সাম্প্রতিক ঘটনাপ্রবাহ", cat:"আন্তর্জাতিক" },
        { id:31, name:"পরিবেশগত ইস্যু ও কূটনীতি", cat:"আন্তর্জাতিক" },
        { id:32, name:"আন্তর্জাতিক সংগঠন", cat:"আন্তর্জাতিক" },
        { id:33, name:"ভৌগোলিক অবস্থান ও সীমানা", cat:"ভূগোল" },
        { id:34, name:"ভৌত পরিবেশ ও সম্পদের বণ্টন", cat:"ভূগোল" },
        { id:35, name:"বাংলাদেশের পরিবেশ ও চ্যালেঞ্জ", cat:"পরিবেশ" },
        { id:36, name:"জলবায়ু পরিবর্তন ও প্রভাব", cat:"পরিবেশ" },
        { id:37, name:"প্রাকৃতিক দুর্যোগ ও ব্যবস্থাপনা", cat:"দুর্যোগ" },
        { id:38, name:"ভৌত বিজ্ঞান (পদার্থ, পরমাণু, এসিড)", cat:"বিজ্ঞান" },
        { id:39, name:"জীব বিজ্ঞান (টিস্যু, জেনেটিক্স)", cat:"বিজ্ঞান" },
        { id:40, name:"আধুনিক বিজ্ঞান", cat:"বিজ্ঞান" },
        { id:41, name:"Computer Organisation & OS", cat:"কম্পিউটার" },
        { id:42, name:"ভাইরাস, ফায়ারওয়াল, প্রোগ্রাম", cat:"কম্পিউটার" },
        { id:43, name:"তথ্যপ্রযুক্তি (ই-কমার্স, ক্লাউড)", cat:"ICT" },
        { id:44, name:"গণিত: সংখ্যা, শতকরা, লাভ-ক্ষতি", cat:"গণিত" },
        { id:45, name:"বীজগাণিতিক সূত্র ও সমীকরণ", cat:"গণিত" },
        { id:46, name:"সূচক ও লগারিদম", cat:"গণিত" },
        { id:47, name:"জ্যামিতি ও পরিমিতি", cat:"গণিত" },
        { id:48, name:"সেট, বিন্যাস ও সম্ভাবনা", cat:"গণিত" },
        { id:49, name:"Verbal Reasoning", cat:"মানসিক দক্ষতা" },
        { id:50, name:"Problem Solving", cat:"মানসিক দক্ষতা" },
        { id:51, name:"Numerical Ability", cat:"মানসিক দক্ষতা" },
        { id:52, name:"নৈতিকতা ও সুশাসনের ধারণা", cat:"নৈতিকতা" },
        { id:53, name:"মূল্যবোধের গুরুত্ব", cat:"নৈতিকতা" },
        { id:54, name:"সুশাসন প্রতিষ্ঠার উপায়", cat:"নৈতিকতা" },
        { id:55, name:"আধুনিক যুগের সাহিত্য - ২", cat:"বাংলা সাহিত্য" },
        { id:56, name:"ভূ-প্রকৃতি ও সম্পদ বণ্টন", cat:"ভূগোল" },
        { id:57, name:"পরিবেশ দূষণ ও প্রতিকার", cat:"পরিবেশ" },
        { id:58, name:"ইংরেজি সাহিত্য কোটেশন", cat:"English Lit." },
        { id:59, name:"আন্তর্জাতিক জোট ও চুক্তি", cat:"আন্তর্জাতিক" },
        { id:60, name:"অর্থনৈতিক সমীক্ষা", cat:"বাংলাদেশ" },
        { id:61, name:"জিন ও বংশগতি", cat:"বিজ্ঞান" }
    ];

    let remainingTopics = [];
    let currentUser = null;

    // ৩. ফাংশনসমূহ
    function shuffleArray(arr) {
        return arr.sort(() => Math.random() - 0.5);
    }

    function updateStats() {
        const total = allTopics.length;
        const done = total - remainingTopics.length;
        const percent = Math.round((done / total) * 100);
        
        document.getElementById('remainingCount').innerText = remainingTopics.length;
        document.getElementById('completedCount').innerText = done;
        document.getElementById('percentComplete').innerText = percent;
        document.getElementById('progressFill').style.width = percent + '%';
    }

    function renderTopics() {
        const container = document.getElementById('topicList');
        if (remainingTopics.length === 0) {
            container.innerHTML = '<div class="text-center" style="padding:2rem;">🎉 অভিনন্দন! সব শেষ!</div>';
            updateStats();
            return;
        }

        container.innerHTML = remainingTopics.map(t => `
            <div class="topic-item">
                <div class="topic-name">${t.name}</div>
                <div class="topic-cat">${t.cat}</div>
                <button class="btn-done" onclick="markDone(${t.id})">Done</button>
            </div>
        `).join('');
        updateStats();
    }

    window.markDone = function(id) {
        remainingTopics = remainingTopics.filter(t => t.id !== id);
        saveData();
        renderTopics();
    };

    function saveData() {
        if (!currentUser) return;
        const ids = remainingTopics.map(t => t.id);
        db.ref('users/' + currentUser.uid).set({
            remainingIds: ids
        });
    }

    // ৪. ইভেন্ট লিসেনার
    document.getElementById('googleLoginBtn').onclick = () => {
        auth.signInWithPopup(provider).catch(e => alert("Login Error: " + e.message));
    };

    document.getElementById('logoutBtn').onclick = () => auth.signOut();

    document.getElementById('shuffleBtn').onclick = () => {
        remainingTopics = shuffleArray([...remainingTopics]);
        renderTopics();
    };

    // ৫. Auth State পরিবর্তন ট্র্যাকিং
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            document.getElementById('userEmail').innerText = user.email;
            document.getElementById('userAvatar').src = user.photoURL;

            // ডাটা লোড করা
            db.ref('users/' + user.uid).once('value').then(snap => {
                const data = snap.val();
                if (data && data.remainingIds) {
                    remainingTopics = allTopics.filter(t => data.remainingIds.includes(t.id));
                } else {
                    remainingTopics = shuffleArray([...allTopics]);
                }
                renderTopics();
            });
        } else {
            currentUser = null;
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('appScreen').classList.add('hidden');
        }
    });
</script>
</body>
</html>
