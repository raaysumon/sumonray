<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Raychat Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: #0f1724; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; }
        .app-container { width: 100%; max-width: 900px; height: 92vh; background: #fff; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); overflow: hidden; display: flex; }
        
        /* নাম প্রম্পট স্ক্রিন */
        .auth-container { flex: 1; display: flex; justify-content: center; align-items: center; background: #075e54; padding: 20px; }
        .auth-card { background: white; border-radius: 24px; padding: 30px 24px; width: 100%; max-width: 360px; text-align: center; }
        .auth-card h2 { color: #075e54; margin-bottom: 16px; }
        .auth-input { width: 100%; padding: 12px 16px; margin: 12px 0; border: 1px solid #ddd; border-radius: 30px; font-size: 1rem; outline: none; }
        .auth-btn { background: #25d366; color: #075e54; font-weight: bold; border: none; padding: 12px; width: 100%; border-radius: 30px; cursor: pointer; font-size: 1rem; }
        .error-msg { color: #e74c3c; font-size: 0.85rem; margin-top: 8px; }
        .hide { display: none !important; }
        
        /* লেআউট */
        .main-app { display: flex; width: 100%; height: 100%; }
        
        /* বাম পাশের ইনবক্স তালিকা (অ্যাডমিনের জন্য) */
        .sidebar { width: 320px; background: #111b21; border-right: 1px solid #222d34; display: flex; flex-direction: column; }
        .sidebar-header { padding: 16px; background: #202c33; color: #e9edef; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-title { font-weight: bold; font-size: 1.1rem; }
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #222d34; cursor: pointer; color: #e9edef; transition: 0.2s; }
        .user-item:hover, .user-item.active { background: #2a3942; }
        .user-avatar { width: 44px; height: 44px; background: #00a884; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        .user-info { flex: 1; overflow: hidden; }
        .user-name { font-size: 0.95rem; font-weight: 600; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        .user-last-msg { font-size: 0.8rem; color: #8696a0; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        
        /* ডান পাশের চ্যাট উইন্ডো */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0b141a; height: 100%; }
        .chat-header { background: #202c33; color: #e9edef; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
        .chat-user-details { display: flex; align-items: center; gap: 12px; }
        .header-actions { display: flex; gap: 10px; }
        .action-btn { background: rgba(255,255,255,0.1); border: none; color: #00a884; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        
        .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background-image: radial-gradient(#1e2930 1px, transparent 0); background-size: 16px 16px; }
        .message { display: flex; flex-direction: column; max-width: 75%; animation: popIn 0.2s ease; }
        .message-own { align-self: flex-end; }
        .message-other { align-self: flex-start; }
        .bubble { padding: 8px 12px; border-radius: 12px; word-wrap: break-word; font-size: 0.95rem; line-height: 1.4; }
        .bubble-own { background: #005c4b; color: #e9edef; border-top-right-radius: 2px; }
        .bubble-other { background: #202c33; color: #e9edef; border-top-left-radius: 2px; }
        .message-time { font-size: 0.65rem; color: #8696a0; margin-top: 4px; align-self: flex-end; }
        
        .input-area { background: #202c33; padding: 12px; display: flex; gap: 10px; align-items: center; }
        .message-input { flex: 1; border: none; background: #2a3942; color: #e9edef; padding: 12px 16px; border-radius: 24px; outline: none; font-size: 0.95rem; }
        .send-btn { background: #00a884; border: none; color: white; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .toast-error { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #e74c3c; color: white; padding: 10px 20px; border-radius: 30px; font-size: 0.85rem; z-index: 2000; }
        
        /* পোর্টেবল মোবাইল ব্যাক বাটন */
        .mobile-back-btn { display: none; background: none; border: none; color: #e9edef; font-size: 1.2rem; cursor: pointer; margin-right: 8px; }

        @media (max-width: 650px) {
            .sidebar { width: 100%; display: flex; }
            .chat-area { display: none; width: 100%; }
            .mobile-active .sidebar { display: none; }
            .mobile-active .chat-area { display: flex; }
            .mobile-back-btn { display: block; }
        }
        @keyframes popIn { from { opacity:0; transform:translateY(6px);} to { opacity:1; transform:translateY(0);} }
        
        /* কল ইন্টারফেস */
        .call-fullscreen-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; }
        .remote-video-full { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .local-video-pip { position: absolute; bottom: 24px; right: 20px; width: 110px; height: 150px; border-radius: 16px; overflow: hidden; background: #1e1e1e; border: 2px solid rgba(255,255,255,0.7); z-index: 10010; }
        .local-video-pip video { width: 100%; height: 100%; object-fit: cover; }
        .call-controls-overlay { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; z-index: 10010; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 60px; width: fit-content; margin: 0 auto; }
        .call-controls-overlay button { background: #2c2c2e; border: none; border-radius: 50%; width: 52px; height: 52px; font-size: 20px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .call-end-btn { background: #ea4335 !important; }
        .remote-info { position: absolute; top: 40px; left: 0; right: 0; text-align: center; color: white; font-size: 20px; font-weight: 600; z-index: 10010; }
        .audio-call-ui { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111b21; }
        .audio-avatar { background: #00a884; width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .audio-avatar i { font-size: 50px; color: white; }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- ১. লগইন স্ক্রিন -->
    <div id="authContainer" class="auth-container">
        <div class="auth-card">
            <h2><i class="fab fa-whatsapp"></i> Rayচ্যাট</h2>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 14px;">আপনার নাম লিখে প্রবেশ করুন</p>
            <input type="text" id="userNameInput" class="auth-input" placeholder="আপনার নাম...">
            <button id="enterAppBtn" class="auth-btn">প্রবেশ করুন</button>
            <div id="authError" class="error-msg"></div>
        </div>
    </div>

    <!-- ২. মূল ইন্টারফেস -->
    <div id="mainApp" class="main-app hide">
        <!-- সাইডবার (শুধুমাত্র Raye/Admin দেখবে) -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">মেসেজ ইনবক্স</div>
                <button id="adminLogoutBtn" style="background:none; border:none; color:#8696a0; cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <div class="user-list" id="userList">
                <div style="text-align: center; color: #8696a0; padding: 20px;">কোনো মেসেজ নেই</div>
            </div>
        </div>

        <!-- চ্যাট বক্স (সবার জন্য) -->
        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <div class="chat-user-details">
                    <button class="mobile-back-btn" id="mobileBackBtn"><i class="fas fa-arrow-left"></i></button>
                    <div class="user-avatar" id="activeAvatar"><i class="fas fa-user"></i></div>
                    <div>
                        <div style="font-weight: bold; font-size: 1rem;" id="activeChatTitle">01567854902</div>
                        <div style="font-size: 0.75rem; color: #8696a0;" id="activeChatStatus">অনলাইন</div>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="audioCallBtn" class="action-btn"><i class="fas fa-phone-alt"></i></button>
                    <button id="videoCallBtn" class="action-btn"><i class="fas fa-video"></i></button>
                    <button id="userLogoutBtn" class="action-btn" title="লগআউট"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
            
            <div id="messagesArea" class="messages-area"></div>
            
            <div class="input-area">
                <input type="text" id="chatMessageInput" class="message-input" placeholder="মেসেজ লিখুন...">
                <button id="sendMsgBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, doc, setDoc, query, orderBy, onSnapshot, addDoc, serverTimestamp, updateDoc } from "firebase/firestore";

    const firebaseConfig = {
        apiKey: "AIzaSyAoZdkD0PZz25lIVrNy3hQE2fBrkHELs2Q",
        authDomain: "rayvid-c074a.firebaseapp.com",
        projectId: "rayvid-c074a",
        storageBucket: "rayvid-c074a.firebasestorage.app",
        messagingSenderId: "970771885312",
        appId: "1:970771885312:web:104ae741f28287a01ad7e5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Elements
    const authContainer = document.getElementById('authContainer');
    const mainAppDiv = document.getElementById('mainApp');
    const userNameInput = document.getElementById('userNameInput');
    const enterAppBtn = document.getElementById('enterAppBtn');
    const authErrorSpan = document.getElementById('authError');
    const sidebar = document.getElementById('sidebar');
    const userList = document.getElementById('userList');
    const messagesArea = document.getElementById('messagesArea');
    const chatMessageInput = document.getElementById('chatMessageInput');
    const sendMsgBtn = document.getElementById('sendMsgBtn');
    const activeChatTitle = document.getElementById('activeChatTitle');
    const activeChatStatus = document.getElementById('activeChatStatus');
    const activeAvatar = document.getElementById('activeAvatar');
    const appContainer = document.getElementById('appContainer');
    const mobileBackBtn = document.getElementById('mobileBackBtn');
    const adminLogoutBtn = document.getElementById('adminLogoutBtn');
    const userLogoutBtn = document.getElementById('userLogoutBtn');
    const audioCallBtn = document.getElementById('audioCallBtn');
    const videoCallBtn = document.getElementById('videoCallBtn');

    let currentUser = null;
    let selectedUserChatId = null;
    let unsubscribeMessages = null;
    let unsubscribeUsersList = null;

    // WebRTC Globals
    let peerConnection = null, localStream = null, remoteAudio = null, remoteVideoElem = null;
    let currentCallDocId = null, isCallActive = false, callSignalUnsubscribe = null, callPanelDiv = null;

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast-error'; toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // অ্যাডমিন: সমস্ত ইউজারের লিস্ট লোড করা
    function loadAdminInboxList() {
        if (unsubscribeUsersList) unsubscribeUsersList();
        const usersRef = collection(db, "user_threads");
        
        unsubscribeUsersList = onSnapshot(usersRef, (snapshot) => {
            if(snapshot.empty) {
                userList.innerHTML = `<div style="text-align: center; color: #8696a0; padding: 20px;">কোনো ইনবক্স পাওয়া যায়নি</div>`;
                return;
            }
            userList.innerHTML = '';
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const userId = docSnap.id;
                
                const item = document.createElement('div');
                item.className = `user-item ${selectedUserChatId === userId ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="user-avatar">${escapeHtml(data.userName ? data.userName[0].toUpperCase() : 'U')}</div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(data.userName || 'অজানা')}</div>
                        <div class="user-last-msg">${escapeHtml(data.lastMessage || 'চ্যাট শুরু করুন')}</div>
                    </div>
                `;
                item.onclick = () => {
                    selectedUserChatId = userId;
                    activeChatTitle.innerText = data.userName || 'ইউজার';
                    activeChatStatus.innerText = "আইডি: " + userId.substring(0,6);
                    activeAvatar.innerText = data.userName ? data.userName[0].toUpperCase() : 'U';
                    appContainer.classList.add('mobile-active');
                    loadMessagesForThread(userId);
                    loadAdminInboxList(); // রিরেন্ডার অ্যাক্টিভ ক্লাস
                };
                userList.appendChild(item);
            });
        });
    }

    // নির্দিষ্ট থ্রেড থেকে মেসেজ লোড করা
    function loadMessagesForThread(threadId) {
        if (unsubscribeMessages) unsubscribeMessages();
        const messagesRef = collection(db, "user_threads", threadId, "messages");
        const q = query(messagesRef, orderBy("timestamp", "asc"));

        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            messagesArea.innerHTML = '';
            if (snapshot.empty) {
                messagesArea.innerHTML = `<div style="text-align:center; color:#8696a0; margin-top:20px;">চ্যাট শুরু করুন!</div>`;
                return;
            }
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const isOwn = data.senderId === currentUser.uid;
                const time = data.timestamp?.toDate() || new Date();
                const timeStr = time.toLocaleTimeString('bn-BD', { hour:'2-digit', minute:'2-digit' });

                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isOwn ? 'message-own' : 'message-other'}`;

                const bubble = document.createElement('div');
                bubble.className = `bubble ${isOwn ? 'bubble-own' : 'bubble-other'}`;
                
                const textSpan = document.createElement('span');
                textSpan.innerText = data.text;
                bubble.appendChild(textSpan);

                const timeSpan = document.createElement('div');
                timeSpan.className = 'message-time';
                timeSpan.innerText = timeStr;
                bubble.appendChild(timeSpan);

                msgDiv.appendChild(bubble);
                messagesArea.appendChild(msgDiv);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        });
    }

    // মেসেজ পাঠানো
    async function sendMessage() {
        const text = chatMessageInput.value.trim();
        if (!text) return;

        const threadId = currentUser.isAdmin ? selectedUserChatId : currentUser.uid;
        if (!threadId) {
            showToast("অনুগ্রহ করে একটি ইনবক্স সিলেক্ট করুন");
            return;
        }

        // মেসেজ যোগ করা
        await addDoc(collection(db, "user_threads", threadId, "messages"), {
            text: text,
            senderId: currentUser.uid,
            senderName: currentUser.name,
            timestamp: serverTimestamp()
        });

        // লাস্ট মেসেজ আপডেট
        await setDoc(doc(db, "user_threads", threadId), {
            userName: currentUser.isAdmin ? activeChatTitle.innerText : currentUser.name,
            lastMessage: text,
            lastUpdated: serverTimestamp()
        }, { merge: true });

        chatMessageInput.value = "";
    }

    // ---------- WEBRTC CALLING ----------
    const iceServers = [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }];
    async function getMediaStream(videoEnabled) { 
        if (localStream) localStream.getTracks().forEach(t => t.stop()); 
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: videoEnabled }); 
        return localStream; 
    }

    async function createPeerConnection(callDocId) {
        if (peerConnection) peerConnection.close();
        const pc = new RTCPeerConnection({ iceServers });
        if (localStream) localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        pc.onicecandidate = async (e) => { 
            if (e.candidate) await addDoc(collection(db, "calls", callDocId, "candidates"), { candidate: e.candidate.toJSON(), senderId: currentUser.uid }); 
        };
        pc.ontrack = (e) => {
            if (e.track.kind === "audio") { 
                if (!remoteAudio) { remoteAudio = new Audio(); remoteAudio.srcObject = e.streams[0]; remoteAudio.play(); } 
                else remoteAudio.srcObject = e.streams[0]; 
            } else if (e.track.kind === "video" && remoteVideoElem) remoteVideoElem.srcObject = e.streams[0];
        };
        pc.onconnectionstatechange = () => { if (pc.connectionState === "failed") { endCall(); showToast("কল বিচ্ছিন্ন হয়েছে"); } };
        return pc;
    }

    function showCallUI(remoteName, isVideoCall) {
        if (callPanelDiv) callPanelDiv.remove();
        callPanelDiv = document.createElement("div");
        callPanelDiv.className = "call-fullscreen-panel";
        
        if (isVideoCall) {
            callPanelDiv.innerHTML = `
                <video id="remoteVideoFullscreen" class="remote-video-full" autoplay playsinline></video>
                <div class="local-video-pip"><video id="localPreviewVideo" autoplay muted playsinline></video></div>
                <div class="call-controls-overlay">
                    <button id="callEndBtn" class="call-end-btn"><i class="fas fa-phone-slash"></i></button>
                </div>
                <div class="remote-info">${escapeHtml(remoteName)}</div>
            `;
            document.body.appendChild(callPanelDiv);
            document.getElementById('localPreviewVideo').srcObject = localStream;
            remoteVideoElem = document.getElementById('remoteVideoFullscreen');
        } else {
            callPanelDiv.innerHTML = `
                <div class="audio-call-ui">
                    <div class="audio-avatar"><i class="fas fa-user"></i></div>
                    <div style="color:white; font-size:22px; font-weight:bold;">${escapeHtml(remoteName)}</div>
                    <div style="color:#8696a0; margin-top:8px;">কলিং...</div>
                    <div class="call-controls-overlay" style="position:relative; margin-top:40px;">
                        <button id="callEndBtn" class="call-end-btn"><i class="fas fa-phone-slash"></i></button>
                    </div>
                </div>
            `;
            document.body.appendChild(callPanelDiv);
        }
        callPanelDiv.querySelector('#callEndBtn').onclick = () => endCall();
    }

    async function startCall(isVideo) {
        if (isCallActive) return;
        const targetId = currentUser.isAdmin ? selectedUserChatId : "raye_admin";
        if(!targetId) { showToast("কল করার জন্য ইউজার নির্বাচন করুন"); return; }
        
        try {
            isCallActive = true;
            await getMediaStream(isVideo);
            const callDoc = await addDoc(collection(db, "calls"), {
                from: currentUser.uid, fromName: currentUser.name, to: targetId,
                status: "calling", type: isVideo ? "video" : "audio", createdAt: serverTimestamp()
            });
            currentCallDocId = callDoc.id;
            peerConnection = await createPeerConnection(currentCallDocId);
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            await updateDoc(doc(db, "calls", currentCallDocId), { offer: { sdp: offer.sdp, type: offer.type }, status: "offer_sent" });
            
            showCallUI(activeChatTitle.innerText, isVideo);
            
            const unsub = onSnapshot(doc(db, "calls", currentCallDocId), async (snap) => {
                const data = snap.data();
                if (data?.answer && peerConnection?.signalingState === "have-local-offer") {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    unsub();
                }
                if (data?.status === "ended") { unsub(); endCall(); }
            });
            callSignalUnsubscribe = unsub;
        } catch(e) { showToast("কল সংযোগ করা সম্ভব হয়নি"); endCall(); }
    }

    async function endCall() {
        if (currentCallDocId) await updateDoc(doc(db, "calls", currentCallDocId), { status: "ended" }).catch(()=>{});
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        if (callSignalUnsubscribe) callSignalUnsubscribe();
        isCallActive = false; currentCallDocId = null;
        if (callPanelDiv) callPanelDiv.remove(); callPanelDiv = null;
    }

    // লগইন অ্যাকশন
    enterAppBtn.onclick = () => {
        const inputName = userNameInput.value.trim();
        if (!inputName) {
            authErrorSpan.innerText = "আপনার নাম লিখুন!";
            return;
        }

        const isRaye = inputName.toLowerCase() === 'raye';

        currentUser = {
            uid: isRaye ? "raye_admin" : "user_" + Math.random().toString(36).substring(2, 9),
            name: isRaye ? "Raye" : inputName,
            isAdmin: isRaye
        };

        localStorage.setItem('raychat_inbox_user', JSON.stringify(currentUser));
        setupAppInterface();
    };

    function setupAppInterface() {
        authContainer.classList.add('hide');
        mainAppDiv.classList.remove('hide');

        if (currentUser.isAdmin) {
            // অ্যাডমিন মোড: সাইডবার সক্রিয়
            sidebar.style.display = "flex";
            activeChatTitle.innerText = "একটি চ্যাট নির্বাচন করুন";
            activeChatStatus.innerText = "";
            userLogoutBtn.style.display = "none";
            loadAdminInboxList();
        } else {
            // সাধারণ ইউজার মোড: সরাসরি চ্যাট
            sidebar.style.display = "none";
            activeChatTitle.innerText = "Ray (01567854902)";
            activeChatStatus.innerText = "অনলাইন";
            selectedUserChatId = currentUser.uid;
            loadMessagesForThread(currentUser.uid);
        }
    }

    const logout = () => {
        localStorage.removeItem('raychat_inbox_user');
        location.reload();
    };

    adminLogoutBtn.onclick = logout;
    userLogoutBtn.onclick = logout;
    mobileBackBtn.onclick = () => appContainer.classList.remove('mobile-active');

    // অটো লগইন
    const saved = localStorage.getItem('raychat_inbox_user');
    if (saved) {
        currentUser = JSON.parse(saved);
        setupAppInterface();
    }

    // ইভেন্ট লিসেনার
    sendMsgBtn.onclick = sendMessage;
    chatMessageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    audioCallBtn.onclick = () => startCall(false);
    videoCallBtn.onclick = () => startCall(true);
</script>
</body>
</html>
