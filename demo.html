This is a complete, production-ready real-time chat web application built with Firebase. It supports multiple users with sign-up, login, and messaging in Bangla, similar to WhatsApp.

<div class="app-container" id="appRoot">
    <!-- অথেন্টিকেশন বিভাগ -->
    <div id="authSection" class="auth-container">

            <input type="email" id="loginEmail" placeholder="ইমেল ঠিকানা" autocomplete="email">
            <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড" autocomplete="current-password">
            <div id="loginError" class="error-msg hide"></div>
            <button class="auth-btn" id="doLoginBtn">লগইন করুন</button>

        <!-- সাইন আপ ফর্ম -->
        <div id="signupForm" class="auth-form hide">
            <input type="text" id="signupName" placeholder="আপনার নাম (যেমন: রহিম)" autocomplete="name">
            <input type="email" id="signupEmail" placeholder="ইমেল ঠিকানা" autocomplete="email">
            <input type="password" id="signupPassword" placeholder="পাসওয়ার্ড (৬ অক্ষর)" autocomplete="new-password">
            <input type="password" id="signupConfirm" placeholder="পাসওয়ার্ড নিশ্চিত করুন">
            <div id="signupError" class="error-msg hide"></div>
            <button class="auth-btn" id="doSignupBtn">নতুন অ্যাকাউন্ট তৈরি করুন</button>

    <!-- চ্যাট প্রধান ইন্টারফেস (প্রথমে লুকানো) -->
    <div id="chatSection" class="hide" style="display: flex; flex-direction: column; height: 100%;">
        <div class="chat-header">
            <div class="user-info">
                <span class="user-name" id="currentUserName">লোড হচ্ছে...</span>
                <span class="user-status">✨ অনলাইন</span>

        <div class="messages-area" id="messagesContainer">

        <div class="input-area">
            <input type="text" id="messageInput" class="message-input" placeholder="বার্তা লিখুন..." autocomplete="off">

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut } from "firebase/auth";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, Timestamp } from "firebase/firestore";

    // Firebase configuration (প্রদত্ত তথ্য)
    const firebaseConfig = {
        apiKey: "AIzaSyAoZdkD0PZz25lIVrNy3hQE2fBrkHELs2Q",
        authDomain: "rayvid-c074a.firebaseapp.com",
        projectId: "rayvid-c074a",
        storageBucket: "rayvid-c074a.firebasestorage.app",
        messagingSenderId: "970771885312",
        appId: "1:970771885312:web:104ae741f28287a01ad7e5"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // DOM elements
    const authSection = document.getElementById('authSection');
    const chatSection = document.getElementById('chatSection');
    const loginFormDiv = document.getElementById('loginForm');
    const signupFormDiv = document.getElementById('signupForm');
    const loginTab = document.getElementById('loginTabBtn');
    const signupTab = document.getElementById('signupTabBtn');
    const loginBtn = document.getElementById('doLoginBtn');
    const signupBtn = document.getElementById('doSignupBtn');
    const loginError = document.getElementById('loginError');
    const signupError = document.getElementById('signupError');
    const logoutBtn = document.getElementById('logoutBtn');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendMessageBtn');
    const currentUserNameSpan = document.getElementById('currentUserName');
    
    // State variables
    let currentUser = null;
    let unsubscribeMessages = null;  // realtime listener unsubscribe function
    
    // Bangla Error messages (user friendly)
    const getBanglaErrorMessage = (errorCode) => {
        switch(errorCode) {
            case 'auth/invalid-email': return 'ইমেল ঠিকানা সঠিক নয়।';
            case 'auth/user-not-found': return 'এই ইমেল ব্যবহারকারী খুঁজে পাওয়া যায়নি।';
            case 'auth/wrong-password': return 'পাসওয়ার্ড ভুল। আবার চেষ্টা করুন।';
            case 'auth/email-already-in-use': return 'এই ইমেল ইতিমধ্যে নিবন্ধিত হয়েছে।';
            case 'auth/weak-password': return 'পাসওয়ার্ড দুর্বল, কমপক্ষে ৬ অক্ষর দিন।';
            case 'auth/invalid-credential': return 'লগইন তথ্য সঠিক নয়।';
            default: return 'একটি ত্রুটি ঘটেছে। আবার চেষ্টা করুন।';
        }
    };
    
    // show/hide auth forms tab switching
    loginTab.addEventListener('click', () => {
        loginTab.classList.add('tab-active');
        signupTab.classList.remove('tab-active');
        loginFormDiv.classList.remove('hide');
        signupFormDiv.classList.add('hide');
        loginError.classList.add('hide');
        signupError.classList.add('hide');
    });
    signupTab.addEventListener('click', () => {
        signupTab.classList.add('tab-active');
        loginTab.classList.remove('tab-active');
        signupFormDiv.classList.remove('hide');
        loginFormDiv.classList.add('hide');
        loginError.classList.add('hide');
        signupError.classList.add('hide');
    });
    
    // লগইন ফাংশন
    const handleLogin = async (email, password) => {
        try {
            loginError.classList.add('hide');
            await signInWithEmailAndPassword(auth, email, password);
            // সফল হলে onAuthStateChanged হ্যান্ডেল করবে
        } catch (error) {
            loginError.textContent = getBanglaErrorMessage(error.code);
            loginError.classList.remove('hide');
        }
    };
    
    // সাইনআপ ফাংশন (নাম, ইমেইল, পাসওয়ার্ড)
    const handleSignup = async (name, email, password, confirm) => {
        if (password !== confirm) {
            signupError.textContent = "পাসওয়ার্ড দুবার মেলেনি।";
            signupError.classList.remove('hide');
            return;
        }
        if (password.length < 6) {
            signupError.textContent = "পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে।";
            signupError.classList.remove('hide');
            return;
        }
        if (!name.trim()) {
            signupError.textContent = "আপনার নাম দিন।";
            signupError.classList.remove('hide');
            return;
        }
        try {
            signupError.classList.add('hide');
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            // ইউজারের প্রোফাইলে নাম সেট করুন
            await updateProfile(userCredential.user, { displayName: name.trim() });
            // রিলোড ইউজার দরকার নেই, onAuthStateChanged দেখাবে
        } catch (error) {
            signupError.textContent = getBanglaErrorMessage(error.code);
            signupError.classList.remove('hide');
        }
    };
    
    loginBtn.addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) {
            loginError.textContent = "ইমেল ও পাসওয়ার্ড দিন।";
            loginError.classList.remove('hide');
            return;
        }
        handleLogin(email, password);
    });
    
    signupBtn.addEventListener('click', () => {
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirm').value;
        handleSignup(name, email, password, confirm);
    });
    
    // লগআউট
    const doLogout = async () => {
        if (unsubscribeMessages) {
            unsubscribeMessages();
            unsubscribeMessages = null;
        }
        await signOut(auth);
    };
    logoutBtn.addEventListener('click', doLogout);
    
    // মেসেজ লোড এবং রিয়েল টাইম লিসেনার (শুধু লগইন অবস্থায়)
    const loadAndListenMessages = (user) => {
        if (unsubscribeMessages) unsubscribeMessages();
        const messagesRef = collection(db, "messages");
        const q = query(messagesRef, orderBy("createdAt", "asc"));
        // clear container
        messagesContainer.innerHTML = '';
        let initialLoad = true;
        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                if (messagesContainer.children.length === 0 || !initialLoad) {
                    messagesContainer.innerHTML = '<div class="empty-chat">🤝 কোনো বার্তা নেই, প্রথম মেসেজ পাঠান!</div>';
                }
                initialLoad = false;
                return;
            }
            // remove empty-chat if exists
            if (messagesContainer.children.length === 1 && messagesContainer.children[0].classList?.contains('empty-chat')) {
                messagesContainer.innerHTML = '';
            }
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    const msgId = change.doc.id;
                    const senderId = data.senderId;
                    const senderName = data.senderName || "অজানা";
                    const messageText = data.text || "";
                    const timestamp = data.createdAt ? data.createdAt.toDate() : new Date();
                    const timeStr = timestamp.toLocaleTimeString('bn-BD', { hour: '2-digit', minute:'2-digit' });
                    const isOwn = (senderId === user.uid);
                    
                    const messageDiv = document.createElement('div');
                    messageDiv.classList.add('message');
                    messageDiv.classList.add(isOwn ? 'message-own' : 'message-other');
                    
                    if (!isOwn) {
                        const nameSpan = document.createElement('div');
                        nameSpan.classList.add('sender-name');
                        nameSpan.innerText = senderName;
                        messageDiv.appendChild(nameSpan);
                    }
                    const bubble = document.createElement('div');
                    bubble.classList.add('bubble');
                    bubble.classList.add(isOwn ? 'bubble-own' : 'bubble-other');
                    bubble.innerText = messageText;
                    messageDiv.appendChild(bubble);
                    
                    const timeSpan = document.createElement('div');
                    timeSpan.classList.add('message-time');
                    timeSpan.innerText = timeStr;
                    messageDiv.appendChild(timeSpan);
                    
                    messagesContainer.appendChild(messageDiv);
                    // auto scroll to bottom
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }
            });
            initialLoad = false;
        }, (error) => {
            console.error("Firestore লিসেনিং ব্যর্থ:", error);
            messagesContainer.innerHTML = '<div class="empty-chat">🔴 সংযোগ ত্রুটি, রিফ্রেশ করুন</div>';
        });
    };
    
    // বার্তা পাঠানোর ফাংশন
    const sendMessage = async () => {
        if (!currentUser) return;
        const text = messageInput.value.trim();
        if (text === "") return;
        const displayName = currentUser.displayName || currentUser.email?.split('@')[0] || "ব্যবহারকারী";
        try {
            const messagesRef = collection(db, "messages");
            await addDoc(messagesRef, {
                text: text,
                senderId: currentUser.uid,
                senderName: displayName,
                createdAt: serverTimestamp(),
            });
            messageInput.value = "";
            messageInput.focus();
        } catch (err) {
            alert("বার্তা পাঠাতে ব্যর্থ: " + err.message);
        }
    };
    
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    // অথেন্টিকেশন স্টেট পরিবর্তন হ্যান্ডলার
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // user logged in
            currentUser = user;
            // displayName সঠিকভাবে সেট করা আছে কিনা নিশ্চিত (সাইনআপে করা হয়েছে, তবে প্রোফাইল আপডেট পরেও)
            if (!user.displayName) {
                // ব্যাকআপ: নাম না থাকলে ইমেলের অংশ দেখানো
                const fallbackName = user.email ? user.email.split('@')[0] : "বন্ধু";
                await updateProfile(user, { displayName: fallbackName });
                currentUser = auth.currentUser; // refresh
            }
            const userName = currentUser.displayName || "চ্যাটার";
            currentUserNameSpan.innerText = userName;
            // UI স্যুইচ: চ্যাট দেখাও, অথ হাইড করো
            authSection.classList.add('hide');
            chatSection.classList.remove('hide');
            // মেসেজ লোড করা শুরু
            loadAndListenMessages(currentUser);
        } else {
            // user logged out
            if (unsubscribeMessages) {
                unsubscribeMessages();
                unsubscribeMessages = null;
            }
            currentUser = null;
            authSection.classList.remove('hide');
            chatSection.classList.add('hide');
            // ফর্ম রিসেট ও ত্রুটি গোপন
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('signupName').value = '';
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';
            document.getElementById('signupConfirm').value = '';
            loginError.classList.add('hide');
            signupError.classList.add('hide');
            // ডিফল্ট ট্যাব লগইন
            loginTab.click();
        }
    });
    
    // দ্রুত ট্যাব সেটআপ
    loginTab.click();
    
    // Firestore নিরাপত্তা নোট (শুধু ডেভেলপার সতর্কতা)
