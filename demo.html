<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Raychat - সরাসরি মেসেঞ্জার</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: linear-gradient(145deg, #1a2a3a 0%, #0f1724 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .app-container { width: 100%; max-width: 600px; height: 90vh; background: rgba(255,255,255,0.96); border-radius: 2rem; box-shadow: 0 25px 45px rgba(0,0,0,0.3); overflow: hidden; display: flex; flex-direction: column; }
        
        /* নাম প্রম্পট স্ক্রিন */
        .auth-container { flex: 1; display: flex; justify-content: center; align-items: center; background: #075e54; padding: 20px; }
        .auth-card { background: white; border-radius: 32px; padding: 30px 24px; width: 100%; max-width: 380px; text-align: center; }
        .auth-card h2 { color: #075e54; margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 12px 16px; margin: 12px 0; border: 1px solid #ddd; border-radius: 40px; font-size: 1rem; outline: none; }
        .auth-btn { background: #25d366; color: #075e54; font-weight: bold; border: none; padding: 12px; width: 100%; border-radius: 40px; cursor: pointer; margin-top: 12px; font-size: 1rem; }
        .error-msg { color: #e74c3c; font-size: 0.85rem; margin-top: 8px; }
        .hide { display: none !important; }
        
        /* চ্যাট ইন্টারফেস */
        .main-app { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .chat-header { background: #075e54; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
        .chat-user-info { display: flex; align-items: center; gap: 12px; }
        .chat-avatar { width: 42px; height: 42px; background: #25d366; color: #075e54; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        .chat-name-header { font-weight: 700; font-size: 1.1rem; }
        .chat-status { font-size: 0.75rem; color: #e0e0e0; }
        .header-actions { display: flex; gap: 8px; }
        .call-btn-sm { background: rgba(255,255,255,0.2); border: none; color: white; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .messages-area { flex: 1; overflow-y: auto; padding: 18px 14px; display: flex; flex-direction: column; gap: 12px; background: #e5ddd5; }
        .message { display: flex; flex-direction: column; max-width: 80%; animation: popIn 0.2s ease; }
        .message-own { align-self: flex-end; }
        .message-other { align-self: flex-start; }
        .bubble { padding: 10px 14px; border-radius: 18px; word-wrap: break-word; font-size: 0.95rem; }
        .bubble-own { background: #dcf8c5; border-bottom-right-radius: 4px; }
        .bubble-other { background: white; border-bottom-left-radius: 4px; }
        .sender-name { font-size: 0.7rem; font-weight: bold; color: #075e54; margin-bottom: 2px; }
        .message-time { font-size: 0.65rem; color: #6c757d; margin-top: 4px; align-self: flex-end; }
        
        .input-area { background: #f0f2f5; padding: 12px 16px; display: flex; gap: 12px; align-items: center; }
        .message-input { flex: 1; border: none; background: white; padding: 12px 18px; border-radius: 30px; outline: none; font-size: 0.95rem; }
        .send-btn { background: #25d366; border: none; color: white; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .toast-error { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #e74c3c; color: white; padding: 10px 20px; border-radius: 30px; font-size: 0.85rem; z-index: 2000; }
        @keyframes popIn { from { opacity:0; transform:translateY(8px);} to { opacity:1; transform:translateY(0);} }
        
        /* ভিডিও ও অডিও কল ইন্টারফেস */
        .call-fullscreen-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; }
        .remote-video-full { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .local-video-pip { position: absolute; bottom: 24px; right: 20px; width: 110px; height: 150px; border-radius: 16px; overflow: hidden; background: #1e1e1e; border: 2px solid rgba(255,255,255,0.7); z-index: 10010; }
        .local-video-pip video { width: 100%; height: 100%; object-fit: cover; }
        .call-controls-overlay { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; z-index: 10010; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 60px; width: fit-content; margin: 0 auto; }
        .call-controls-overlay button { background: #2c2c2e; border: none; border-radius: 50%; width: 52px; height: 52px; font-size: 20px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .call-end-btn { background: #e74c3c !important; }
        .remote-info { position: absolute; top: 40px; left: 0; right: 0; text-align: center; color: white; text-shadow: 0 2px 8px black; font-size: 20px; font-weight: 600; z-index: 10010; }
        .audio-call-ui { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f2120; }
        .audio-avatar { background: #128c7e; width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .audio-avatar i { font-size: 50px; color: white; }
    </style>
</head>
<body>
<div class="app-container">
    <!-- ১. নাম প্রম্পট -->
    <div id="authContainer" class="auth-container">
        <div class="auth-card">
            <h2><i class="fab fa-whatsapp"></i> Rayচ্যাট</h2>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 12px;">আপনার নাম লিখে চ্যাট শুরু করুন</p>
            <input type="text" id="userNameInput" class="auth-input" placeholder="আপনার নাম লিখুন...">
            <button id="enterAppBtn" class="auth-btn">প্রবেশ করুন</button>
            <div id="authError" class="error-msg"></div>
        </div>
    </div>

    <!-- ২. ডায়রেক্ট চ্যাট ইন্টারফেস -->
    <div id="mainApp" class="main-app hide">
        <div class="chat-header">
            <div class="chat-user-info">
                <div class="chat-avatar" id="headerAvatar"><i class="fas fa-user"></i></div>
                <div>
                    <div class="chat-name-header" id="headerTitle">01567854902</div>
                    <div class="chat-status" id="headerStatus">সরাসরি মেসেজ পাঠান</div>
                </div>
            </div>
            <div class="header-actions">
                <button id="audioCallBtn" class="call-btn-sm" title="অডিও কল"><i class="fas fa-phone-alt"></i></button>
                <button id="videoCallBtn" class="call-btn-sm" title="ভিডিও কল"><i class="fas fa-video"></i></button>
                <button id="logoutBtn" class="call-btn-sm" title="লগআউট"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        
        <div id="messagesArea" class="messages-area"></div>
        
        <div class="input-area">
            <input type="text" id="chatMessageInput" class="message-input" placeholder="মেসেজ লিখুন...">
            <button id="sendMsgBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, doc, setDoc, query, orderBy, onSnapshot, addDoc, serverTimestamp, updateDoc } from "firebase/firestore";

    const firebaseConfig = {
        apiKey: "AIzaSyAoZdkD0PZz25lIVrNy3hQE2fBrkHELs2Q",
        authDomain: "rayvid-c074a.firebaseapp.com",
        projectId: "rayvid-c074a",
        storageBucket: "rayvid-c074a.firebasestorage.app",
        messagingSenderId: "970771885312",
        appId: "1:970771885312:web:104ae741f28287a01ad7e5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const MAIN_TARGET_NUMBER = "01567854902"; // নির্দিষ্ট নম্বর

    // DOM Elements
    const authContainer = document.getElementById('authContainer');
    const mainAppDiv = document.getElementById('mainApp');
    const userNameInput = document.getElementById('userNameInput');
    const enterAppBtn = document.getElementById('enterAppBtn');
    const authErrorSpan = document.getElementById('authError');
    const messagesArea = document.getElementById('messagesArea');
    const chatMessageInput = document.getElementById('chatMessageInput');
    const sendMsgBtn = document.getElementById('sendMsgBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const audioCallBtn = document.getElementById('audioCallBtn');
    const videoCallBtn = document.getElementById('videoCallBtn');
    const headerTitle = document.getElementById('headerTitle');
    const headerStatus = document.getElementById('headerStatus');

    let currentUser = null;
    let unsubscribeMessages = null;

    // WebRTC Globals
    let peerConnection = null, localStream = null, remoteAudio = null, remoteVideoElem = null;
    let currentCallDocId = null, isCallActive = false, callSignalUnsubscribe = null, callPanelDiv = null;

    function showToast(msg) {
        let toast = document.querySelector('.toast-error');
        if(toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast-error';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // মেসেজ লোড করার ফাংশন
    function loadDirectMessages() {
        if (unsubscribeMessages) unsubscribeMessages();
        const messagesRef = collection(db, "direct_chats", MAIN_TARGET_NUMBER, "messages");
        const q = query(messagesRef, orderBy("timestamp", "asc"));

        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                messagesArea.innerHTML = `<div style="text-align:center; color:#666; margin-top:20px;">হ্যালো <b>${escapeHtml(currentUser.name)}</b>! <br>এখনো কোনো মেসেজ আসেনি।</div>`;
                return;
            }
            messagesArea.innerHTML = '';
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                
                // Raye হলে সে যাকে উত্তর দেবে সেটা তার জন্য "own" মেসেজ
                const isOwn = data.senderId === currentUser.uid;
                const time = data.timestamp?.toDate() || new Date();
                const timeStr = time.toLocaleTimeString('bn-BD', { hour:'2-digit', minute:'2-digit' });

                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isOwn ? 'message-own' : 'message-other'}`;

                const bubble = document.createElement('div');
                bubble.className = `bubble ${isOwn ? 'bubble-own' : 'bubble-other'}`;
                
                // অন্য ইউজারদের নাম দেখানো
                if (!isOwn) {
                    const senderDiv = document.createElement('div');
                    senderDiv.className = 'sender-name';
                    senderDiv.innerText = data.senderName || 'ব্যবহারকারী';
                    bubble.appendChild(senderDiv);
                }

                const textSpan = document.createElement('span');
                textSpan.innerText = data.text;
                bubble.appendChild(textSpan);

                const timeSpan = document.createElement('div');
                timeSpan.className = 'message-time';
                timeSpan.innerText = timeStr;
                bubble.appendChild(timeSpan);

                msgDiv.appendChild(bubble);
                messagesArea.appendChild(msgDiv);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        });
    }

    // মেসেজ পাঠানো
    async function sendDirectMessage() {
        const text = chatMessageInput.value.trim();
        if (!text) return;

        await addDoc(collection(db, "direct_chats", MAIN_TARGET_NUMBER, "messages"), {
            text: text,
            senderId: currentUser.uid,
            senderName: currentUser.name,
            timestamp: serverTimestamp()
        });

        chatMessageInput.value = "";
    }

    // ---------- WEBRTC CALLING ----------
    const iceServers = [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }];
    
    async function getMediaStream(videoEnabled) { 
        if (localStream) localStream.getTracks().forEach(t => t.stop()); 
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: videoEnabled }); 
        localStream = stream; 
        return stream; 
    }

    async function createPeerConnection(callDocId) {
        if (peerConnection) peerConnection.close();
        const pc = new RTCPeerConnection({ iceServers });
        if (localStream) localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        pc.onicecandidate = async (e) => { 
            if (e.candidate) await addDoc(collection(db, "calls", callDocId, "candidates"), { candidate: e.candidate.toJSON(), senderId: currentUser.uid }); 
        };
        pc.ontrack = (e) => {
            if (e.track.kind === "audio") { 
                if (!remoteAudio) { remoteAudio = new Audio(); remoteAudio.srcObject = e.streams[0]; remoteAudio.play(); } 
                else remoteAudio.srcObject = e.streams[0]; 
            } else if (e.track.kind === "video" && remoteVideoElem) remoteVideoElem.srcObject = e.streams[0];
        };
        pc.onconnectionstatechange = () => { if (pc.connectionState === "failed") { endCall(); showToast("কল কেটে গেছে"); } };
        return pc;
    }

    function showModernCallUI(remoteName, isVideoCall) {
        if (callPanelDiv) callPanelDiv.remove();
        callPanelDiv = document.createElement("div");
        callPanelDiv.className = "call-fullscreen-panel";
        
        if (isVideoCall) {
            callPanelDiv.innerHTML = `
                <video id="remoteVideoFullscreen" class="remote-video-full" autoplay playsinline></video>
                <div class="local-video-pip"><video id="localPreviewVideo" autoplay muted playsinline></video></div>
                <div class="call-controls-overlay">
                    <button id="callMuteBtn"><i class="fas fa-microphone"></i></button>
                    <button id="callVideoToggleBtn"><i class="fas fa-video"></i></button>
                    <button class="call-end-btn" id="callEndBtn"><i class="fas fa-phone-slash"></i></button>
                </div>
                <div class="remote-info">${escapeHtml(remoteName)}</div>
            `;
            document.body.appendChild(callPanelDiv);
            document.getElementById('localPreviewVideo').srcObject = localStream;
            remoteVideoElem = document.getElementById('remoteVideoFullscreen');
        } else {
            callPanelDiv.innerHTML = `
                <div class="audio-call-ui">
                    <div class="audio-avatar"><i class="fas fa-user"></i></div>
                    <div style="color:white; font-size:24px; font-weight:bold;">${escapeHtml(remoteName)}</div>
                    <div style="color:#a0c0c0; margin-top:8px;">অডিও কল সংযুক্ত</div>
                    <div class="call-controls-overlay" style="position:relative; margin-top:40px;">
                        <button id="callMuteBtn"><i class="fas fa-microphone"></i></button>
                        <button class="call-end-btn" id="callEndBtn"><i class="fas fa-phone-slash"></i></button>
                    </div>
                </div>
            `;
            document.body.appendChild(callPanelDiv);
        }
        
        callPanelDiv.querySelector('#callEndBtn').onclick = () => endCall();
        
        let muted = false;
        callPanelDiv.querySelector('#callMuteBtn').onclick = (e) => {
            muted = !muted;
            localStream.getAudioTracks().forEach(t => t.enabled = !muted);
            e.currentTarget.innerHTML = muted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
        };

        if (isVideoCall) {
            let videoOff = false;
            callPanelDiv.querySelector('#callVideoToggleBtn').onclick = (e) => {
                videoOff = !videoOff;
                localStream.getVideoTracks()[0].enabled = !videoOff;
                e.currentTarget.innerHTML = videoOff ? '<i class="fas fa-video-slash"></i>' : '<i class="fas fa-video"></i>';
            };
        }
    }

    async function startCall(isVideo) {
        if (isCallActive) return;
        try {
            isCallActive = true;
            await getMediaStream(isVideo);
            const callDoc = await addDoc(collection(db, "calls"), {
                from: currentUser.uid, fromName: currentUser.name, to: MAIN_TARGET_NUMBER,
                status: "calling", type: isVideo ? "video" : "audio", createdAt: serverTimestamp()
            });
            currentCallDocId = callDoc.id;
            peerConnection = await createPeerConnection(currentCallDocId);
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            await updateDoc(doc(db, "calls", currentCallDocId), { offer: { sdp: offer.sdp, type: offer.type }, status: "offer_sent" });
            
            showModernCallUI(MAIN_TARGET_NUMBER, isVideo);
            
            const unsub = onSnapshot(doc(db, "calls", currentCallDocId), async (snap) => {
                const data = snap.data();
                if (data?.answer && peerConnection?.signalingState === "have-local-offer") {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    unsub();
                }
                if (data?.status === "rejected" || data?.status === "ended") { unsub(); endCall(); }
            });
            callSignalUnsubscribe = unsub;
        } catch(e) { showToast("কল করতে সমস্যা হয়েছে"); endCall(); }
    }

    async function endCall() {
        if (currentCallDocId) await updateDoc(doc(db, "calls", currentCallDocId), { status: "ended" }).catch(()=>{});
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        if (callSignalUnsubscribe) callSignalUnsubscribe();
        isCallActive = false; currentCallDocId = null;
        if (callPanelDiv) callPanelDiv.remove(); callPanelDiv = null;
    }

    // নাম চেক ও প্রবেশের লজিক
    enterAppBtn.onclick = () => {
        const inputName = userNameInput.value.trim();
        if (!inputName) {
            authErrorSpan.innerText = "দয়া করে আপনার নাম লিখুন!";
            return;
        }

        // নাম 'Raye' হলে বিশেষ অ্যাডমিন রোল
        const isRaye = inputName.toLowerCase() === 'raye';

        currentUser = {
            uid: isRaye ? "raye_admin_id" : "usr_" + Math.random().toString(36).substring(2, 9),
            name: isRaye ? "Raye" : inputName,
            isAdmin: isRaye
        };

        localStorage.setItem('raychat_direct_user', JSON.stringify(currentUser));

        authContainer.classList.add('hide');
        mainAppDiv.classList.remove('hide');

        if (isRaye) {
            headerTitle.innerText = "Ray (Admin)";
            headerStatus.innerText = "সকল মেসেজের ইনবক্স";
        } else {
            headerTitle.innerText = "01567854902";
            headerStatus.innerText = "সরাসরি মেসেজ পাঠান";
        }

        loadDirectMessages();
    };

    logoutBtn.onclick = () => {
        localStorage.removeItem('raychat_direct_user');
        location.reload();
    };

    // অটো লগইন
    const savedUser = localStorage.getItem('raychat_direct_user');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        authContainer.classList.add('hide');
        mainAppDiv.classList.remove('hide');
        
        if (currentUser.isAdmin) {
            headerTitle.innerText = "Ray (Admin)";
            headerStatus.innerText = "সকল মেসেজের ইনবক্স";
        } else {
            headerTitle.innerText = "01567854902";
            headerStatus.innerText = "সরাসরি মেসেজ পাঠান";
        }
        
        loadDirectMessages();
    }

    // Event Listeners
    sendMsgBtn.onclick = () => sendDirectMessage();
    chatMessageInput.onkeypress = (e) => { if (e.key === 'Enter') sendDirectMessage(); };
    audioCallBtn.onclick = () => startCall(false);
    videoCallBtn.onclick = () => startCall(true);
</script>
</body>
</html>
