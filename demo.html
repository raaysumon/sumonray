<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>আড্ডা চ্যাট + ভিডিও কল (ওয়াটসঅ্যাপ স্টাইল)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(145deg, #1a2a3a 0%, #0f1724 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .app-container { width: 100%; max-width: 1200px; height: 92vh; background: rgba(255,255,255,0.96); border-radius: 2rem; box-shadow: 0 25px 45px rgba(0,0,0,0.3); overflow: hidden; display: flex; flex-direction: column; }
        .auth-container { flex: 1; display: flex; justify-content: center; align-items: center; background: #075e54; padding: 20px; }
        .auth-card { background: white; border-radius: 32px; padding: 30px 24px; width: 100%; max-width: 400px; text-align: center; }
        .auth-card h2 { color: #075e54; margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 12px 16px; margin: 12px 0; border: 1px solid #ddd; border-radius: 40px; font-size: 1rem; outline: none; }
        .auth-btn { background: #25d366; color: #075e54; font-weight: bold; border: none; padding: 12px; width: 100%; border-radius: 40px; cursor: pointer; margin-top: 12px; }
        .auth-switch { margin-top: 20px; color: #128c7e; cursor: pointer; font-size: 0.9rem; }
        .error-msg { color: #e74c3c; font-size: 0.8rem; margin-top: 6px; }
        .hide { display: none !important; }
        .main-app { display: flex; height: 100%; width: 100%; overflow: hidden; }
        .contacts-panel { width: 35%; background: #f0f2f5; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; overflow-y: auto; }
        .chat-panel { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; background-image: radial-gradient(circle at 25% 40%, rgba(200,220,210,0.4) 1.5%, transparent 1.8%); }
        @media (max-width: 700px) {
            .contacts-panel { width: 100%; position: absolute; z-index: 10; height: 100%; transition: transform 0.2s; }
            .contacts-panel.hide-mobile { transform: translateX(-100%); }
            .back-btn { display: block !important; }
        }
        .profile-header { background: #075e54; color: white; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .search-box { padding: 10px; background: #f0f2f5; }
        .search-box input { width: 100%; padding: 10px 16px; border-radius: 30px; border: none; background: white; outline: none; }
        .contact-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #e9ecef; }
        .contact-item:hover, .contact-item.active { background: #e9ecef; }
        .contact-avatar { width: 48px; height: 48px; background: #128c7e; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.2rem; }
        .contact-info { flex: 1; }
        .contact-name { font-weight: 600; }
        .contact-phone { font-size: 0.75rem; color: #6c757d; }
        .chat-header { background: #075e54; color: white; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
        .back-btn { display: none; background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; }
        .chat-name { font-weight: 700; flex: 1; }
        .call-btn-sm { background: rgba(255,255,255,0.2); border: none; color: white; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; margin-left: 6px; }
        .messages-area { flex: 1; overflow-y: auto; padding: 18px 14px; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; flex-direction: column; max-width: 80%; animation: popIn 0.2s ease; }
        .message-own { align-self: flex-end; }
        .message-other { align-self: flex-start; }
        .bubble { padding: 10px 14px; border-radius: 18px; word-wrap: break-word; background: white; }
        .bubble-own { background: #dcf8c5; border-bottom-right-radius: 4px; }
        .bubble-other { background: white; border-bottom-left-radius: 4px; }
        .message-time { font-size: 0.6rem; color: #6c757d; margin-top: 4px; margin-left: 10px; }
        .input-area { background: #f0f2f5; padding: 12px 16px; display: flex; gap: 12px; }
        .message-input { flex: 1; border: none; background: white; padding: 12px 18px; border-radius: 30px; outline: none; }
        .send-btn { background: #25d366; border: none; color: white; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; }
        .call-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #1a2a2a; z-index: 1050; display: flex; flex-direction: column; border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 16px; }
        .video-container { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .video-box { background: #000; border-radius: 16px; overflow: hidden; width: 45%; aspect-ratio: 4/3; }
        .video-box video { width: 100%; height: 100%; object-fit: cover; }
        .call-controls { display: flex; justify-content: center; gap: 20px; margin-top: 12px; }
        .call-end-btn, .call-mute-btn, .call-video-toggle { background: #e74c3c; border: none; border-radius: 50%; width: 52px; height: 52px; font-size: 1.5rem; color: white; cursor: pointer; }
        .toast-error { position: fixed; bottom: 100px; left: 20px; right: 20px; background: #e74c3c; color: white; padding: 10px; border-radius: 30px; text-align: center; z-index: 2000; font-size: 0.9rem; }
        @keyframes popIn { from { opacity:0; transform:translateY(8px);} to { opacity:1; transform:translateY(0);} }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <!-- Auth Container -->
    <div id="authContainer" class="auth-container">
        <div class="auth-card">
            <h2><i class="fab fa-whatsapp"></i> আড্ডা চ্যাট</h2>
            <div id="loginForm">
                <input type="email" id="loginEmail" class="auth-input" placeholder="ইমেল">
                <input type="password" id="loginPassword" class="auth-input" placeholder="পাসওয়ার্ড">
                <button id="doLoginBtn" class="auth-btn">সাইন ইন করুন</button>
                <div class="auth-switch" id="showSignupBtn">অ্যাকাউন্ট নেই? সাইন আপ করুন</div>
            </div>
            <div id="signupForm" class="hide">
                <input type="text" id="signupName" class="auth-input" placeholder="আপনার নাম">
                <input type="tel" id="signupPhone" class="auth-input" placeholder="মোবাইল নম্বর (যেমন: +8801xxxxxxxx)">
                <input type="email" id="signupEmail" class="auth-input" placeholder="ইমেল">
                <input type="password" id="signupPassword" class="auth-input" placeholder="পাসওয়ার্ড">
                <button id="doSignupBtn" class="auth-btn">সাইন আপ করুন</button>
                <div class="auth-switch" id="showLoginBtn">ইতিমধ্যে অ্যাকাউন্ট আছে? লগইন করুন</div>
            </div>
            <div id="authError" class="error-msg"></div>
        </div>
    </div>

    <!-- Main WhatsApp Style App -->
    <div id="mainApp" class="main-app hide">
        <div id="contactsPanel" class="contacts-panel">
            <div class="profile-header">
                <span><i class="fab fa-whatsapp"></i> চ্যাটসমূহ</span>
                <button id="logoutBtn" class="call-btn-sm" style="background: transparent; border:1px solid white;"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <div class="search-box">
                <input type="text" id="searchPhoneInput" placeholder="🔍 ফোন নম্বর দিয়ে খুঁজুন...">
            </div>
            <div id="contactsList" style="flex:1; overflow-y: auto;"></div>
        </div>
        <div id="chatPanel" class="chat-panel">
            <div class="chat-header">
                <button id="mobileBackBtn" class="back-btn"><i class="fas fa-arrow-left"></i></button>
                <div class="chat-name" id="chatContactName">কাউকে সিলেক্ট করুন</div>
                <button id="audioCallBtn" class="call-btn-sm"><i class="fas fa-phone-alt"></i></button>
                <button id="videoCallBtn" class="call-btn-sm"><i class="fas fa-video"></i></button>
            </div>
            <div id="messagesArea" class="messages-area">
                <div style="text-align:center; color:#888;">বাম থেকে একজন পরিচিতি নির্বাচন করুন</div>
            </div>
            <div class="input-area">
                <input type="text" id="chatMessageInput" class="message-input" placeholder="মেসেজ লিখুন...">
                <button id="sendMsgBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "firebase/auth";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, orderBy, onSnapshot, addDoc, serverTimestamp, updateDoc, writeBatch } from "firebase/firestore";

    const firebaseConfig = {
        apiKey: "AIzaSyAoZdkD0PZz25lIVrNy3hQE2fBrkHELs2Q",
        authDomain: "rayvid-c074a.firebaseapp.com",
        projectId: "rayvid-c074a",
        storageBucket: "rayvid-c074a.firebasestorage.app",
        messagingSenderId: "970771885312",
        appId: "1:970771885312:web:104ae741f28287a01ad7e5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM elements
    const authContainer = document.getElementById('authContainer');
    const mainAppDiv = document.getElementById('mainApp');
    const loginFormDiv = document.getElementById('loginForm');
    const signupFormDiv = document.getElementById('signupForm');
    const authErrorSpan = document.getElementById('authError');
    const contactsListDiv = document.getElementById('contactsList');
    const searchInput = document.getElementById('searchPhoneInput');
    const chatContactNameSpan = document.getElementById('chatContactName');
    const messagesArea = document.getElementById('messagesArea');
    const chatMessageInput = document.getElementById('chatMessageInput');
    const sendMsgBtn = document.getElementById('sendMsgBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const audioCallBtn = document.getElementById('audioCallBtn');
    const videoCallBtn = document.getElementById('videoCallBtn');
    const mobileBackBtn = document.getElementById('mobileBackBtn');
    const contactsPanel = document.getElementById('contactsPanel');

    let currentUser = null;
    let currentUserDoc = null;
    let selectedContact = null;
    let unsubscribeMessages = null;
    let allUsers = [];

    // WebRTC call globals (simplified, same as before)
    let peerConnection = null, localStream = null, remoteAudio = null, remoteVideo = null;
    let currentCallDocId = null, isCallActive = false, callSignalUnsubscribe = null, callPanelDiv = null;

    function showToast(msg) {
        let toast = document.querySelector('.toast-error');
        if(toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast-error';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    // Helper: get conversation document ID (sorted UIDs)
    function getConversationId(uid1, uid2) {
        return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
    }

    // Send private message using subcollection to avoid composite indexes
    async function sendPrivateMessage() {
        if (!selectedContact) { showToast("একজন ব্যবহারকারী নির্বাচন করুন"); return; }
        const text = chatMessageInput.value.trim();
        if (!text) return;
        const convId = getConversationId(currentUser.uid, selectedContact.uid);
        try {
            // Ensure conversation document exists
            const convRef = doc(db, "conversations", convId);
            const convSnap = await getDoc(convRef);
            if (!convSnap.exists()) {
                await setDoc(convRef, {
                    participants: [currentUser.uid, selectedContact.uid],
                    lastUpdated: serverTimestamp()
                });
            }
            // Add message to subcollection
            await addDoc(collection(db, "conversations", convId, "messages"), {
                text: text,
                senderId: currentUser.uid,
                senderName: currentUserDoc?.name || currentUser.displayName,
                receiverId: selectedContact.uid,
                timestamp: serverTimestamp()
            });
            chatMessageInput.value = "";
        } catch(e) {
            console.error(e);
            showToast("মেসেজ পাঠাতে ব্যর্থ: " + e.message);
        }
    }

    // Load messages for selected conversation
    async function loadMessagesForConversation(contact) {
        if (unsubscribeMessages) unsubscribeMessages();
        const convId = getConversationId(currentUser.uid, contact.uid);
        const messagesRef = collection(db, "conversations", convId, "messages");
        const q = query(messagesRef, orderBy("timestamp", "asc"));
        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                messagesArea.innerHTML = '<div style="text-align:center; color:gray;">কোনো মেসেজ নেই। এখনই লিখুন 📝</div>';
                return;
            }
            messagesArea.innerHTML = '';
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const isOwn = data.senderId === currentUser.uid;
                const time = data.timestamp?.toDate() || new Date();
                const timeStr = time.toLocaleTimeString('bn-BD', { hour:'2-digit', minute:'2-digit' });
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
                const bubble = document.createElement('div');
                bubble.className = `bubble ${isOwn ? 'bubble-own' : 'bubble-other'}`;
                bubble.innerText = data.text;
                msgDiv.appendChild(bubble);
                const timeSpan = document.createElement('div');
                timeSpan.className = 'message-time';
                timeSpan.innerText = timeStr;
                msgDiv.appendChild(timeSpan);
                messagesArea.appendChild(msgDiv);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }, (error) => {
            console.error("Message listener error:", error);
            showToast("মেসেজ লোড করতে সমস্যা হয়েছে। রিফ্রেশ করুন।");
        });
    }

    function selectContact(contact) {
        if (unsubscribeMessages) unsubscribeMessages();
        selectedContact = contact;
        chatContactNameSpan.innerText = `${contact.name} ${contact.phone ? '('+contact.phone+')' : ''}`;
        messagesArea.innerHTML = '<div style="text-align:center;">লোড হচ্ছে...</div>';
        loadMessagesForConversation(contact);
        if (window.innerWidth <= 700) contactsPanel.classList.add('hide-mobile');
    }

    // Fetch all users except self
    async function fetchAndRenderContacts() {
        const usersSnapshot = await getDocs(collection(db, "users"));
        allUsers = [];
        usersSnapshot.forEach(docSnap => {
            const data = docSnap.data();
            if (data.uid !== currentUser?.uid) {
                allUsers.push({ uid: data.uid, name: data.name || "বন্ধু", phone: data.phone || "নম্বর নাই" });
            }
        });
        renderContactsList(allUsers);
    }

    function renderContactsList(usersArray) {
        const searchTerm = searchInput.value.trim();
        let filtered = usersArray;
        if (searchTerm) filtered = usersArray.filter(u => u.phone && u.phone.includes(searchTerm));
        if (filtered.length === 0) {
            contactsListDiv.innerHTML = '<div style="padding:20px; text-align:center;">কোনো ব্যবহারকারী পাওয়া যায়নি</div>';
            return;
        }
        contactsListDiv.innerHTML = '';
        filtered.forEach(user => {
            const div = document.createElement('div');
            div.className = 'contact-item';
            if (selectedContact && selectedContact.uid === user.uid) div.classList.add('active');
            div.innerHTML = `
                <div class="contact-avatar">${user.name.charAt(0).toUpperCase()}</div>
                <div class="contact-info">
                    <div class="contact-name">${escapeHtml(user.name)}</div>
                    <div class="contact-phone">${escapeHtml(user.phone)}</div>
                </div>
            `;
            div.addEventListener('click', () => selectContact(user));
            contactsListDiv.appendChild(div);
        });
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // ---------- WebRTC Call Logic (unchanged, works globally) ----------
    const iceServers = [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" },
        { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" }
    ];
    async function getMediaStream(videoEnabled) {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: videoEnabled });
        localStream = stream;
        return stream;
    }
    async function createPeerConnection(callDocId) {
        if (peerConnection) peerConnection.close();
        const pc = new RTCPeerConnection({ iceServers });
        if (localStream) localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        pc.onicecandidate = async (e) => {
            if (e.candidate) await addDoc(collection(db, "calls", callDocId, "candidates"), { candidate: e.candidate.toJSON(), senderId: currentUser.uid });
        };
        pc.ontrack = (e) => {
            if (e.track.kind === "audio") {
                if (!remoteAudio) { remoteAudio = new Audio(); remoteAudio.srcObject = e.streams[0]; remoteAudio.play(); }
                else remoteAudio.srcObject = e.streams[0];
            } else if (e.track.kind === "video" && remoteVideo) remoteVideo.srcObject = e.streams[0];
        };
        pc.onconnectionstatechange = () => { if (pc.connectionState === "failed") { endCall(); showToast("কল সংযোগ ব্যর্থ"); } };
        return pc;
    }
    async function startCall(targetUser, videoEnabled) {
        if (isCallActive) { showToast("কল চলছে"); return; }
        try {
            isCallActive = true;
            await getMediaStream(videoEnabled);
            const callDoc = await addDoc(collection(db, "calls"), {
                from: currentUser.uid, fromName: currentUserDoc?.name,
                to: targetUser.uid, toName: targetUser.name,
                status: "calling", type: videoEnabled ? "video" : "audio", createdAt: serverTimestamp()
            });
            currentCallDocId = callDoc.id;
            peerConnection = await createPeerConnection(currentCallDocId);
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            await updateDoc(doc(db, "calls", currentCallDocId), { offer: { sdp: offer.sdp, type: offer.type }, status: "offer_sent" });
            // listen for candidates & answer...
            const unsub = onSnapshot(doc(db, "calls", currentCallDocId), async (snap) => {
                const data = snap.data();
                if (data?.answer && peerConnection?.signalingState === "have-local-offer") {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    unsub();
                }
                if (data?.status === "active") showCallPanelUI(targetUser.name, videoEnabled);
                if (data?.status === "rejected" || data?.status === "ended") { unsub(); endCall(); if(data?.status === "rejected") showToast("কল প্রত্যাখ্যান"); }
            });
            callSignalUnsubscribe = unsub;
            showCallPanelUI(targetUser.name, videoEnabled);
        } catch(e) { showToast("কল শুরু ব্যর্থ"); endCall(); }
    }
    async function answerCall(callId, fromUserObj, videoRequired) {
        try {
            await getMediaStream(videoRequired);
            const callRef = doc(db, "calls", callId);
            const callSnap = await getDoc(callRef);
            if (!callSnap.exists()) throw new Error();
            const callData = callSnap.data();
            currentCallDocId = callId;
            peerConnection = await createPeerConnection(callId);
            await peerConnection.setRemoteDescription(new RTCSessionDescription(callData.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            await updateDoc(callRef, { answer: { sdp: answer.sdp, type: answer.type }, status: "active" });
            showCallPanelUI(fromUserObj.name, videoRequired);
            const unsub = onSnapshot(callRef, (snap) => { if (snap.data()?.status === "ended") { unsub(); endCall(); } });
            callSignalUnsubscribe = unsub;
        } catch(e) { showToast("কল গ্রহণ ব্যর্থ"); endCall(); }
    }
    async function endCall() {
        if (currentCallDocId) await updateDoc(doc(db, "calls", currentCallDocId), { status: "ended" }).catch(()=>{});
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        if (remoteAudio) { remoteAudio.srcObject = null; remoteAudio = null; }
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        if (callSignalUnsubscribe) callSignalUnsubscribe();
        isCallActive = false; currentCallDocId = null;
        if (callPanelDiv) callPanelDiv.remove(); callPanelDiv = null; remoteVideo = null;
    }
    function showCallPanelUI(remoteName, isVideo) {
        if (callPanelDiv) callPanelDiv.remove();
        callPanelDiv = document.createElement("div"); callPanelDiv.className = "call-panel";
        let videoHtml = '';
        if (isVideo) {
            videoHtml = `<div class="video-container"><div class="video-box"><video id="localVideo" autoplay muted playsinline></video><div class="video-label">আপনি</div></div><div class="video-box"><video id="remoteVideo" autoplay playsinline></video><div class="video-label">${escapeHtml(remoteName)}</div></div></div>`;
        }
        callPanelDiv.innerHTML = `${videoHtml}<div class="call-controls"><button class="call-mute-btn" id="muteCallBtn"><i class="fas fa-microphone"></i></button>${isVideo ? '<button class="call-video-toggle" id="toggleVideoBtn"><i class="fas fa-video"></i></button>' : ''}<button class="call-end-btn" id="hangupCallBtn"><i class="fas fa-phone-slash"></i></button></div>`;
        document.body.appendChild(callPanelDiv);
        if (isVideo && localStream) {
            const localVid = document.getElementById('localVideo'); if(localVid) localVid.srcObject = localStream;
            remoteVideo = document.getElementById('remoteVideo');
        }
        document.getElementById("hangupCallBtn")?.addEventListener("click", () => endCall());
        const muteBtn = document.getElementById("muteCallBtn");
        let muted = false;
        muteBtn?.addEventListener("click", () => { if(localStream) { muted = !muted; localStream.getAudioTracks()[0].enabled = !muted; muteBtn.innerHTML = muted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>'; } });
        if (isVideo) {
            const vidToggle = document.getElementById("toggleVideoBtn");
            let vidOff = false;
            vidToggle?.addEventListener("click", () => { if(localStream?.getVideoTracks().length) { vidOff = !vidOff; localStream.getVideoTracks()[0].enabled = !vidOff; vidToggle.innerHTML = vidOff ? '<i class="fas fa-video-slash"></i>' : '<i class="fas fa-video"></i>'; } });
        }
    }
    function listenIncomingCalls() {
        if (!currentUser) return;
        const q = query(collection(db, "calls"), where("to", "==", currentUser.uid), where("status", "in", ["calling", "offer_sent"]));
        onSnapshot(q, async (snapshot) => {
            for (const change of snapshot.docChanges()) {
                if (change.type === "added") {
                    const callData = change.doc.data();
                    if (isCallActive) { await updateDoc(doc(db, "calls", change.doc.id), { status: "rejected" }); return; }
                    const accept = confirm(`${callData.fromName || "অজানা"} ${callData.type === "video" ? "ভিডিও কল" : "অডিও কল"} করছেন। রিসিভ করবেন?`);
                    if (accept) await answerCall(change.doc.id, { name: callData.fromName, uid: callData.from }, callData.type === "video");
                    else await updateDoc(doc(db, "calls", change.doc.id), { status: "rejected" });
                }
            }
        });
    }

    // Auth handlers
    async function createUserProfile(uid, name, phone, email) {
        await setDoc(doc(db, "users", uid), { name, phone, email, uid, createdAt: serverTimestamp() });
    }
    document.getElementById('doSignupBtn').addEventListener('click', async () => {
        const name = document.getElementById('signupName').value.trim();
        const phone = document.getElementById('signupPhone').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        if (!name || !phone || !email || !password) { authErrorSpan.innerText = 'সব ফিল্ড পূরণ করুন'; return; }
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            await updateProfile(userCred.user, { displayName: name });
            await createUserProfile(userCred.user.uid, name, phone, email);
        } catch(e) { authErrorSpan.innerText = e.message; }
    });
    document.getElementById('doLoginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { authErrorSpan.innerText = 'ইমেল ও পাসওয়ার্ড দিন'; return; }
        try { await signInWithEmailAndPassword(auth, email, password); } catch(e) { authErrorSpan.innerText = e.message; }
    });
    document.getElementById('showSignupBtn').onclick = () => { loginFormDiv.classList.add('hide'); signupFormDiv.classList.remove('hide'); authErrorSpan.innerText = ''; };
    document.getElementById('showLoginBtn').onclick = () => { signupFormDiv.classList.add('hide'); loginFormDiv.classList.remove('hide'); authErrorSpan.innerText = ''; };
    logoutBtn.onclick = async () => { await signOut(auth); };

    // Presence and app init
    async function updatePresence() {
        if (!currentUser) return;
        await setDoc(doc(db, "presence", currentUser.uid), { uid: currentUser.uid, nickname: currentUserDoc?.name, lastSeen: serverTimestamp() }, { merge: true });
    }
    setInterval(() => updatePresence(), 20000);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) currentUserDoc = userDoc.data();
            else { currentUserDoc = { name: user.displayName || "বন্ধু", phone: "" }; }
            authContainer.classList.add('hide');
            mainAppDiv.classList.remove('hide');
            await fetchAndRenderContacts();
            updatePresence();
            listenIncomingCalls();
            searchInput.addEventListener('input', () => renderContactsList(allUsers));
            sendMsgBtn.onclick = sendPrivateMessage;
            chatMessageInput.onkeypress = (e) => { if(e.key === 'Enter') sendPrivateMessage(); };
            audioCallBtn.onclick = () => { if(selectedContact) startCall(selectedContact, false); else showToast("একটি কন্টাক্ট সিলেক্ট করুন"); };
            videoCallBtn.onclick = () => { if(selectedContact) startCall(selectedContact, true); else showToast("একটি কন্টাক্ট সিলেক্ট করুন"); };
            mobileBackBtn.onclick = () => contactsPanel.classList.remove('hide-mobile');
        } else {
            if (unsubscribeMessages) unsubscribeMessages();
            endCall();
            authContainer.classList.remove('hide');
            mainAppDiv.classList.add('hide');
            selectedContact = null;
        }
    });
</script>
</body>
</html>
